<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Responder Quiz</title>

<style>

body{
  font-family:Arial;
  background:#020617;
  color:white;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
}

.top{
  margin-bottom:30px;
}

.subtitle{
  color:#94a3b8;
  margin-top:10px;
}

.timer{
  margin-top:15px;
  color:#22c55e;
  font-weight:bold;
}



/* PROGRESS */

.progress{
  width:100%;
  height:12px;
  background:#1e293b;
  border-radius:20px;
  margin-top:25px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:#22c55e;
}



/* PLAYER */

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin-top:20px;
}



/* QUESTION */

.question{
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  margin-top:25px;
}

.option{
  background:#0f172a;
  padding:15px;
  border-radius:10px;
  margin-top:12px;
  cursor:pointer;
  border:2px solid transparent;
}

.selected{
  border:2px solid #22c55e;
}



/* BUTTON */

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  margin-top:25px;
  font-weight:bold;
  cursor:pointer;
}



/* RESULT */

.result{
  margin-top:40px;
}

.review{
  padding:15px;
  border-radius:12px;
  margin-top:15px;
}

.correct{
  background:#052e16;
}

.wrong{
  background:#450a0a;
}

.ranking-item{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}

.password-area{
  display:none;
  background:#1e293b;
  padding:25px;
  border-radius:20px;
  margin-bottom:20px;
}

</style>
</head>

<body>

<div class="container">



<div
id="password-area"
class="password-area"
>

<h2>
🔒 Quiz Privado
</h2>

<input
type="password"
id="quiz-password"
placeholder="Senha do quiz"
>

<button onclick="validarSenha()">
Entrar
</button>

</div>



<div class="top">

<h1 id="quiz-title">
Carregando...
</h1>

<p class="subtitle">
Responda uma pergunta por vez
</p>

<div
id="timer"
class="timer"
>
⏱️ 00:00
</div>



<div class="progress">

<div
id="progress-bar"
class="progress-bar"
></div>

</div>

</div>



<input
type="text"
id="player"
placeholder="Seu nome"
>



<div id="quiz"></div>



<button
id="next-btn"
onclick="proximaPergunta()"
>
Próxima Pergunta
</button>



<div id="resultado"></div>

</div>

<script>

const slug =
window.location.pathname
.split("/")
.pop();

let quizId = null;

let perguntas = [];

let perguntaAtual = 0;

let respostas = {};

let segundos = 0;

let intervalo;



/* =========================
   TIMER
========================= */

function iniciarTimer(){

intervalo = setInterval(() => {

segundos++;

const minutos =
String(
Math.floor(segundos / 60)
).padStart(2,"0");

const secs =
String(
segundos % 60
).padStart(2,"0");

document.getElementById(
"timer"
).innerText =
`⏱️ ${minutos}:${secs}`;

},1000);

}



/* =========================
   LOAD QUIZ
========================= */

async function carregarQuizPorSlug(){

const res = await fetch(
`/api/quizzes/slug/${slug}`
);

const quiz = await res.json();

quizId = quiz.id;

document.getElementById(
"quiz-title"
).innerText = quiz.title;

if(quiz.is_public == 0){

document.getElementById(
"password-area"
).style.display = "block";

return;

}

carregarPerguntas();

}



/* =========================
   PASSWORD
========================= */

async function validarSenha(){

const password =
document.getElementById(
"quiz-password"
).value;

const res = await fetch(
`/api/quizzes/${quizId}/validate-password`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
password
})
}
);

const data = await res.json();

if(!data.success){

return alert(
"Senha incorreta"
);

}

document.getElementById(
"password-area"
).style.display = "none";

carregarPerguntas();

}



/* =========================
   PERGUNTAS
========================= */

async function carregarPerguntas(){

const res = await fetch(
`/api/quizzes/${quizId}/full`
);

perguntas =
await res.json();

mostrarPergunta();

}



/* =========================
   MOSTRAR
========================= */

function mostrarPergunta(){

const p =
perguntas[perguntaAtual];

const porcentagem =
((perguntaAtual + 1)
/
perguntas.length)
* 100;

document.getElementById(
"progress-bar"
).style.width =
`${porcentagem}%`;

document.getElementById(
"quiz"
).innerHTML = `

<div class="question">

<h2>
Pergunta
${perguntaAtual + 1}
de
${perguntas.length}
</h2>

<br>

<h3>
${p.question}
</h3>

<div id="options">

${p.options.map(op => `

<div
class="option"
onclick="
selecionar(
${p.id},
${op.id},
this
)
"
>

${op.text}

</div>

`).join("")}

</div>

</div>

`;

}



/* =========================
   SELECT
========================= */

function selecionar(
questionId,
optionId,
el
){

respostas[questionId] =
optionId;

document
.querySelectorAll(".option")
.forEach(op => {
op.classList.remove(
"selected"
);
});

el.classList.add("selected");

}



/* =========================
   NEXT
========================= */

function proximaPergunta(){

const p =
perguntas[perguntaAtual];

if(
!respostas[p.id]
){

return alert(
"Selecione uma resposta"
);

}

perguntaAtual++;

if(
perguntaAtual
<
perguntas.length
){

mostrarPergunta();

}else{

finalizarQuiz();

}

}



/* =========================
   FINAL
========================= */

async function finalizarQuiz(){

clearInterval(intervalo);

let score = 0;

let detalhes = "";



for(
const questionId
in respostas
){

const optionId =
respostas[questionId];



const check =
await fetch(
`/api/quizzes/check/${optionId}`
);

const checkData =
await check.json();



const correta =
await fetch(
`/api/quizzes/questions/${questionId}/correct`
);

const corretaData =
await correta.json();



const pergunta =
perguntas.find(
p => p.id == questionId
);



const respostaUsuario =
pergunta.options.find(
o => o.id == optionId
);



if(checkData.correct){

score++;

detalhes += `

<div class="
review
correct
">

✅ ${pergunta.question}

<br><br>

Sua resposta:
${respostaUsuario.text}

</div>

`;

}else{

detalhes += `

<div class="
review
wrong
">

❌ ${pergunta.question}

<br><br>

Sua resposta:
${respostaUsuario.text}

<br><br>

Resposta correta:
${corretaData.text}

</div>

`;

}

}



const player_name =
document.getElementById(
"player"
).value;



await fetch(
`/api/quizzes/${quizId}/result`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
player_name,
score
})
}
);



document.getElementById(
"quiz"
).innerHTML = "";

document.getElementById(
"next-btn"
).style.display = "none";



document.getElementById(
"resultado"
).innerHTML = `

<div class="result">

<h2>
${player_name},
você acertou
${score}
perguntas
</h2>

<p style="margin-top:10px">

⏱️ Tempo:
${Math.floor(segundos / 60)}
min e
${segundos % 60}
seg

</p>



<div
id="ranking"
style="margin-top:30px"
></div>



<div style="margin-top:30px">

<h2>
Revisão
</h2>

${detalhes}

</div>

</div>

`;



carregarRanking();

}



/* =========================
   RANKING
========================= */

async function carregarRanking(){

const res = await fetch(
`/api/quizzes/${quizId}/ranking`
);

const ranking =
await res.json();

const div =
document.getElementById(
"ranking"
);

div.innerHTML =
"<h2>Ranking</h2>";



ranking.forEach((r,index)=>{

div.innerHTML += `

<div class="ranking-item">

<strong>
#${index + 1}
</strong>

- ${r.player_name}

<br><br>

${r.score} pontos

</div>

`;

});

}



/* =========================
   START
========================= */

async function iniciar(){

await carregarQuizPorSlug();

iniciarTimer();

}

iniciar();

</script>

</body>
</html>
