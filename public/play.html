<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Quiz Rocha</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#020617;
  color:white;
  min-height:100vh;
  padding:25px;
}



/* =========================
   LAYOUT
========================= */

.container{
  max-width:850px;
  margin:auto;
}



/* =========================
   TOP
========================= */

.top{
  margin-bottom:30px;
}

.quiz-title{
  font-size:42px;
  margin-bottom:10px;
}

.subtitle{
  color:#94a3b8;
  font-size:16px;
}

.info-bar{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
  margin-top:25px;
}

.info-card{
  background:#1e293b;
  padding:14px 18px;
  border-radius:14px;
  font-weight:bold;
}



/* =========================
   PROGRESS
========================= */

.progress{
  width:100%;
  height:14px;
  background:#1e293b;
  border-radius:30px;
  overflow:hidden;
  margin-top:25px;
}

.progress-bar{
  width:0%;
  height:100%;
  background:#22c55e;
  transition:0.3s;
}



/* =========================
   PASSWORD
========================= */

.password-area{
  display:none;
  background:#1e293b;
  padding:30px;
  border-radius:24px;
  margin-bottom:25px;
}

.password-area h2{
  margin-bottom:15px;
}



/* =========================
   PLAYER
========================= */

.player-card{
  background:#1e293b;
  padding:25px;
  border-radius:24px;
  margin-bottom:25px;
}



/* =========================
   INPUT
========================= */

input{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  outline:none;
  background:#f1f5f9;
  font-size:16px;
}



/* =========================
   QUESTION
========================= */

.question-card{
  background:#1e293b;
  padding:30px;
  border-radius:24px;
  margin-top:25px;
}

.question-number{
  color:#94a3b8;
  margin-bottom:15px;
  font-size:15px;
}

.question-title{
  font-size:28px;
  line-height:1.4;
}



/* =========================
   OPTIONS
========================= */

.options{
  margin-top:30px;
}

.option{
  background:#0f172a;
  border:2px solid transparent;
  padding:18px;
  border-radius:18px;
  margin-top:14px;
  cursor:pointer;
  transition:0.2s;
  font-size:17px;
}

.option:hover{
  border-color:#334155;
}

.selected{
  border-color:#22c55e;
  background:#052e16;
}



/* =========================
   BUTTONS
========================= */

button{
  width:100%;
  border:none;
  padding:18px;
  border-radius:16px;
  margin-top:25px;
  background:#22c55e;
  color:black;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}



/* =========================
   RESULT
========================= */

.result-card{
  background:#1e293b;
  padding:30px;
  border-radius:24px;
  margin-top:30px;
}

.score{
  font-size:42px;
  margin-top:15px;
  color:#22c55e;
}

.review{
  padding:20px;
  border-radius:18px;
  margin-top:18px;
}

.correct{
  background:#052e16;
}

.wrong{
  background:#450a0a;
}



/* =========================
   RANKING
========================= */

.ranking-title{
  margin-top:35px;
  margin-bottom:15px;
}

.ranking-item{
  background:#0f172a;
  padding:18px;
  border-radius:16px;
  margin-top:12px;
}



/* =========================
   RESPONSIVO
========================= */

@media(max-width:700px){

  body{
    padding:15px;
  }

  .quiz-title{
    font-size:32px;
  }

  .question-title{
    font-size:22px;
  }

}

</style>

</head>

<body>

<div class="container">



<!-- PASSWORD -->

<div
  id="password-area"
  class="password-area"
>

  <h2>
    🔒 Quiz Privado
  </h2>

  <input
    type="password"
    id="quiz-password"
    placeholder="Digite a senha"
  >

  <button onclick="validarSenha()">
    Entrar no Quiz
  </button>

</div>



<!-- TOP -->

<div class="top">

  <h1
    id="quiz-title"
    class="quiz-title"
  >
    Carregando...
  </h1>

  <p class="subtitle">
    Responda uma pergunta por vez
  </p>



  <div class="info-bar">

    <div
      class="info-card"
      id="timer"
    >
      ⏱️ 00:00
    </div>

    <div
      class="info-card"
      id="progress-text"
    >
      Pergunta 0/0
    </div>

  </div>



  <div class="progress">

    <div
      id="progress-bar"
      class="progress-bar"
    ></div>

  </div>

</div>



<!-- PLAYER -->

<div class="player-card">

  <input
    type="text"
    id="player"
    placeholder="Digite seu nome"
  >

</div>



<!-- QUIZ -->

<div id="quiz"></div>



<!-- BUTTON -->

<button
  id="next-btn"
  onclick="proximaPergunta()"
>
  Próxima Pergunta
</button>



<!-- RESULT -->

<div id="resultado"></div>

</div>

<script>

const slug =
  window.location.pathname
  .split("/")
  .pop();



let quizId = null;

let perguntas = [];

let perguntaAtual = 0;

let respostas = {};

let segundos = 0;

let intervalo;



/* =========================
   TIMER
========================= */

function iniciarTimer(){

  intervalo = setInterval(() => {

    segundos++;

    const minutos =
      String(
        Math.floor(segundos / 60)
      ).padStart(2,"0");

    const secs =
      String(
        segundos % 60
      ).padStart(2,"0");



    document.getElementById(
      "timer"
    ).innerHTML =
      `⏱️ ${minutos}:${secs}`;

  },1000);

}



/* =========================
   LOAD QUIZ
========================= */

async function carregarQuizPorSlug(){

  try{

    const res = await fetch(
      `/api/quizzes/slug/${slug}`
    );



    if(!res.ok){

      throw new Error(
        "Quiz não encontrado"
      );

    }



    const quiz =
      await res.json();



    if(!quiz || !quiz.id){

      throw new Error(
        "Quiz inválido"
      );

    }



    quizId = quiz.id;



    document.getElementById(
      "quiz-title"
    ).innerText =
      quiz.title;



    if(quiz.is_public == 0){

      document.getElementById(
        "password-area"
      ).style.display = "block";

      return;

    }



    carregarPerguntas();

  }catch(err){

    console.error(err);

    document.body.innerHTML = `
      <div
        style="
          padding:40px;
          text-align:center;
          color:white;
        "
      >

        <h1>
          Quiz não encontrado
        </h1>

      </div>
    `;

  }

}



/* =========================
   PASSWORD
========================= */

async function validarSenha(){

  const password =
    document.getElementById(
      "quiz-password"
    ).value;



  const res =
    await fetch(
      `/api/quizzes/${quizId}/validate-password`,
      {

        method:"POST",

        headers:{
          "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
          password
        })

      }
    );



  const data =
    await res.json();



  if(!data.success){

    return alert(
      "Senha incorreta"
    );

  }



  document.getElementById(
    "password-area"
  ).style.display = "none";



  carregarPerguntas();

}



/* =========================
   LOAD QUESTIONS
========================= */

async function carregarPerguntas(){

  const res =
    await fetch(
      `/api/quizzes/${quizId}/full`
    );



  perguntas =
    await res.json();



  if(!perguntas.length){

    document.getElementById(
      "quiz"
    ).innerHTML = `
      <div class="question-card">

        <h2>
          Este quiz ainda não possui perguntas.
        </h2>

      </div>
    `;

    document.getElementById(
      "next-btn"
    ).style.display = "none";

    return;

  }



  mostrarPergunta();

}



/* =========================
   SHOW QUESTION
========================= */

function mostrarPergunta(){

  const p =
    perguntas[perguntaAtual];



  if(!p){
    return;
  }



  const porcentagem =
    (
      (perguntaAtual + 1)
      /
      perguntas.length
    ) * 100;



  document.getElementById(
    "progress-bar"
  ).style.width =
    `${porcentagem}%`;



  document.getElementById(
    "progress-text"
  ).innerHTML =
    `Pergunta ${perguntaAtual + 1}/${perguntas.length}`;



  document.getElementById(
    "quiz"
  ).innerHTML = `

    <div class="question-card">

      <div class="question-number">

        Pergunta
        ${perguntaAtual + 1}

      </div>

      <div class="question-title">

        ${p.question}

      </div>



      <div class="options">

        ${p.options.map(op => `

          <div
            class="option"
            onclick="
              selecionar(
                ${p.id},
                ${op.id},
                this
              )
            "
          >

            ${op.text}

          </div>

        `).join("")}

      </div>

    </div>

  `;

}



/* =========================
   SELECT
========================= */

function selecionar(
  questionId,
  optionId,
  el
){

  respostas[questionId] =
    optionId;



  document
    .querySelectorAll(".option")
    .forEach(op => {

      op.classList.remove(
        "selected"
      );

    });



  el.classList.add(
    "selected"
  );

}



/* =========================
   NEXT
========================= */

function proximaPergunta(){

  const p =
    perguntas[perguntaAtual];



  if(!respostas[p.id]){

    return alert(
      "Selecione uma resposta"
    );

  }



  perguntaAtual++;



  if(
    perguntaAtual
    <
    perguntas.length
  ){

    mostrarPergunta();

  }else{

    finalizarQuiz();

  }

}



/* =========================
   FINISH
========================= */

async function finalizarQuiz(){

  clearInterval(intervalo);

  let score = 0;

  let detalhes = "";



  for(
    const questionId
    in respostas
  ){

    const optionId =
      respostas[questionId];



    const check =
      await fetch(
        `/api/quizzes/check/${optionId}`
      );



    const checkData =
      await check.json();



    const correta =
      await fetch(
        `/api/quizzes/questions/${questionId}/correct`
      );



    const corretaData =
      await correta.json();



    const pergunta =
      perguntas.find(
        p => p.id == questionId
      );



    const respostaUsuario =
      pergunta.options.find(
        o => o.id == optionId
      );



    if(checkData.correct){

      score++;

      detalhes += `

        <div class="review correct">

          <strong>
            ✅ ${pergunta.question}
          </strong>

          <br><br>

          Sua resposta:
          ${respostaUsuario.text}

        </div>

      `;

    }else{

      detalhes += `

        <div class="review wrong">

          <strong>
            ❌ ${pergunta.question}
          </strong>

          <br><br>

          Sua resposta:
          ${respostaUsuario.text}

          <br><br>

          Correta:
          ${corretaData.text}

        </div>

      `;

    }

  }



  const player_name =
    document.getElementById(
      "player"
    ).value || "Jogador";



  await fetch(
    `/api/quizzes/${quizId}/result`,
    {

      method:"POST",

      headers:{
        "Content-Type":
          "application/json"
      },

      body:JSON.stringify({
        player_name,
        score
      })

    }
  );



  document.getElementById(
    "quiz"
  ).innerHTML = "";



  document.getElementById(
    "next-btn"
  ).style.display = "none";



  document.getElementById(
    "resultado"
  ).innerHTML = `

    <div class="result-card">

      <h2>
        Quiz Finalizado
      </h2>

      <div class="score">

        ${score}/${perguntas.length}

      </div>

      <p style="margin-top:15px">

        ⏱️ Tempo:
        ${Math.floor(segundos / 60)}
        min e
        ${segundos % 60}
        seg

      </p>



      <h2 class="ranking-title">
        Revisão
      </h2>

      ${detalhes}



      <div
        id="ranking"
        style="margin-top:35px"
      ></div>

    </div>

  `;



  carregarRanking();

}



/* =========================
   RANKING
========================= */

async function carregarRanking(){

  const res =
    await fetch(
      `/api/quizzes/${quizId}/ranking`
    );



  const ranking =
    await res.json();



  const div =
    document.getElementById(
      "ranking"
    );



  div.innerHTML =
    `
      <h2>
        Ranking
      </h2>
    `;



  ranking.forEach((r,index)=>{

    div.innerHTML += `

      <div class="ranking-item">

        <strong>
          #${index + 1}
        </strong>

        — ${r.player_name}

        <br><br>

        ${r.score} pontos

      </div>

    `;

  });

}



/* =========================
   START
========================= */

async function iniciar(){

  await carregarQuizPorSlug();

  iniciarTimer();

}



iniciar();

</script>

</body>
</html>
