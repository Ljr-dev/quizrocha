<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Quiz Rocha</title>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
  rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#020617;

  --card:#111827;

  --card2:#1e293b;

  --border:rgba(255,255,255,.06);

  --text:#ffffff;

  --muted:#94a3b8;

  --green:#22c55e;

  --green-dark:#16a34a;

  --red:#ef4444;

  --blue:#2563eb;

}

body{

  font-family:'Inter',sans-serif;

  background:
    radial-gradient(
      circle at top,
      #0f172a 0%,
      #020617 65%
    );

  color:white;

  min-height:100vh;

  padding:20px;

  overflow-x:hidden;

}

.container{
  max-width:1000px;
  margin:auto;
}

/* =========================
TOP
========================= */

.top{
  margin-bottom:28px;
}

.quiz-title{

  font-size:52px;

  line-height:1.1;

  font-weight:900;

  margin-bottom:12px;

}

.subtitle{

  color:#94a3b8;

  font-size:17px;

  line-height:1.6;

}

.info-bar{

  display:flex;

  gap:16px;

  flex-wrap:wrap;

  margin-top:28px;

}

.info-card{

  background:
    linear-gradient(
      180deg,
      rgba(30,41,59,.98),
      rgba(15,23,42,.98)
    );

  border:
    1px solid rgba(255,255,255,.05);

  padding:16px 22px;

  border-radius:20px;

  font-weight:700;

  display:flex;

  align-items:center;

  gap:10px;

  box-shadow:
    0 10px 30px rgba(0,0,0,.25);

}

/* =========================
PROGRESS
========================= */

.progress{

  width:100%;

  height:16px;

  background:#1e293b;

  border-radius:999px;

  overflow:hidden;

  margin-top:26px;

}

.progress-bar{

  width:0%;

  height:100%;

  background:
    linear-gradient(
      90deg,
      #22c55e,
      #16a34a
    );

  transition:.3s;

}

/* =========================
PASSWORD
========================= */

.password-area{

  display:none;

  background:
    linear-gradient(
      180deg,
      rgba(30,41,59,.98),
      rgba(15,23,42,.98)
    );

  border:
    1px solid rgba(255,255,255,.06);

  padding:32px;

  border-radius:32px;

  margin-bottom:28px;

}

.password-area h2{

  margin-bottom:18px;

  font-size:30px;

}

/* =========================
PLAYER
========================= */

.player-card{

  background:
    linear-gradient(
      180deg,
      rgba(30,41,59,.98),
      rgba(15,23,42,.98)
    );

  border:
    1px solid rgba(255,255,255,.06);

  padding:28px;

  border-radius:32px;

  margin-bottom:28px;

  box-shadow:
    0 20px 50px rgba(0,0,0,.3);

}

/* =========================
INPUT
========================= */

input{

  width:100%;

  padding:18px;

  border:none;

  border-radius:18px;

  outline:none;

  background:#f8fafc;

  font-size:16px;

}

/* =========================
QUESTION
========================= */

.question-card{

  background:
    linear-gradient(
      180deg,
      rgba(30,41,59,.98),
      rgba(15,23,42,.98)
    );

  border:
    1px solid rgba(255,255,255,.06);

  padding:38px;

  border-radius:34px;

  margin-top:28px;

  box-shadow:
    0 20px 50px rgba(0,0,0,.3);

}

.question-number{

  color:#94a3b8;

  margin-bottom:16px;

  font-size:15px;

  font-weight:600;

}

.question-title{

  font-size:34px;

  line-height:1.5;

  font-weight:800;

}

/* =========================
OPTIONS
========================= */

.options{
  margin-top:34px;
}

.option{

  background:#0f172a;

  border:
    2px solid transparent;

  padding:22px;

  border-radius:22px;

  margin-top:18px;

  cursor:pointer;

  transition:.2s;

  font-size:18px;

  line-height:1.6;

}

.option:hover{
  border-color:#334155;
  transform:translateY(-2px);
}

.selected{

  border-color:#22c55e;

  background:#052e16;

}

/* =========================
BUTTON
========================= */

button{

  width:100%;

  border:none;

  padding:20px;

  border-radius:20px;

  margin-top:28px;

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );

  color:black;

  font-size:17px;

  font-weight:800;

  cursor:pointer;

  transition:.2s;

}

button:hover{
  transform:translateY(-2px);
}

/* =========================
RESULT
========================= */

.result-card{

  background:
    linear-gradient(
      180deg,
      rgba(30,41,59,.98),
      rgba(15,23,42,.98)
    );

  border:
    1px solid rgba(255,255,255,.06);

  padding:38px;

  border-radius:34px;

  margin-top:35px;

  box-shadow:
    0 20px 50px rgba(0,0,0,.3);

}

.result-card h2{

  font-size:38px;

  font-weight:900;

}

.score{

  font-size:72px;

  margin-top:25px;

  color:#22c55e;

  font-weight:900;

  line-height:1;

}

.review{

  padding:24px;

  border-radius:24px;

  margin-top:20px;

  line-height:1.8;

}

.correct{
  background:#052e16;
}

.wrong{
  background:#450a0a;
}

/* =========================
RANKING
========================= */

.ranking-title{

  margin-top:45px;

  margin-bottom:22px;

  font-size:30px;

  font-weight:800;

}

.ranking-item{

  background:#0f172a;

  border:
    1px solid rgba(255,255,255,.04);

  padding:24px;

  border-radius:24px;

  margin-top:16px;

  line-height:1.8;

}

/* =========================
RESPONSIVO
========================= */

@media(max-width:768px){

  body{
    padding:14px;
  }

  .quiz-title{
    font-size:38px;
  }

  .question-title{
    font-size:28px;
  }

  .question-card{
    padding:26px;
  }

  .result-card{
    padding:28px;
  }

  .score{
    font-size:58px;
  }

  .option{
    padding:18px;
    font-size:16px;
  }

  .password-area,
  .player-card{
    padding:24px;
  }

}

@media(max-width:480px){

  body{
    padding:12px;
  }

  .quiz-title{
    font-size:32px;
  }

  .subtitle{
    font-size:15px;
  }

  .question-title{
    font-size:24px;
  }

  .question-card{
    padding:22px;
    border-radius:28px;
  }

  .result-card{
    padding:22px;
    border-radius:28px;
  }

  .score{
    font-size:48px;
  }

  .option{

    padding:16px;

    font-size:15px;

    border-radius:18px;

  }

  .info-bar{
    flex-direction:column;
  }

  .info-card{
    width:100%;
  }

  input{
    padding:16px;
    font-size:15px;
  }

  button{
    padding:18px;
    font-size:16px;
  }

  .review{
    padding:18px;
  }

}

</style>

</head>

<body>

<div class="container">

<!-- PASSWORD -->

<div
  id="password-area"
  class="password-area"
>

  <h2>
    🔒 Quiz Privado
  </h2>

  <input
    type="password"
    id="quiz-password"
    placeholder="Digite a senha"
  >

  <button onclick="validarSenha()">
    Entrar no Quiz
  </button>

</div>

<!-- TOP -->

<div class="top">

  <h1
    id="quiz-title"
    class="quiz-title"
  >
    Carregando...
  </h1>

  <p class="subtitle">

    Responda uma pergunta por vez
    e acompanhe seu desempenho
    em tempo real.

  </p>

  <div class="info-bar">

    <div
      class="info-card"
      id="timer"
    >
      ⏱️ 00:00
    </div>

    <div
      class="info-card"
      id="progress-text"
    >
      Pergunta 0/0
    </div>

  </div>

  <div class="progress">

    <div
      id="progress-bar"
      class="progress-bar"
    ></div>

  </div>

</div>

<!-- PLAYER -->

<div class="player-card">

  <input
    type="text"
    id="player"
    placeholder="Digite seu nome"
  >

</div>

<!-- QUIZ -->

<div id="quiz"></div>

<!-- BUTTON -->

<button
  id="next-btn"
  onclick="proximaPergunta()"
>
  Próxima Pergunta
</button>

<!-- RESULT -->

<div id="resultado"></div>

</div>

<script>

/* =========================
SLUG
========================= */

const slug =
  window.location.pathname
  .split("/")
  .pop();

let quizId = null;

let perguntas = [];

let perguntaAtual = 0;

let respostas = {};

let segundos = 0;

let intervalo;

/* =========================
TIMER
========================= */

function iniciarTimer(){

  intervalo = setInterval(() => {

    segundos++;

    const minutos =
      String(
        Math.floor(segundos / 60)
      ).padStart(2,"0");

    const secs =
      String(
        segundos % 60
      ).padStart(2,"0");

    document.getElementById(
      "timer"
    ).innerHTML =
      `⏱️ ${minutos}:${secs}`;

  },1000);

}

/* =========================
LOAD QUIZ
========================= */

async function carregarQuizPorSlug(){

  try{

    const res =
      await fetch(
        `/api/quizzes/slug/${slug}`
      );

    if(!res.ok){

      throw new Error(
        "Quiz não encontrado"
      );

    }

    const quiz =
      await res.json();

    if(!quiz || !quiz.id){

      throw new Error(
        "Quiz inválido"
      );

    }

    quizId = quiz.id;

    document.getElementById(
      "quiz-title"
    ).innerText =
      quiz.title;

    if(quiz.is_public == 0){

      document.getElementById(
        "password-area"
      ).style.display = "block";

      return;

    }

    carregarPerguntas();

  }catch(err){

    console.error(err);

    document.body.innerHTML = `

      <div
        style="
          padding:40px;
          text-align:center;
          color:white;
        "
      >

        <h1>
          Quiz não encontrado
        </h1>

      </div>

    `;

  }

}

/* =========================
PASSWORD
========================= */

async function validarSenha(){

  const password =
    document.getElementById(
      "quiz-password"
    ).value;

  const res =
    await fetch(
      `/api/quizzes/${quizId}/validate-password`,
      {

        method:"POST",

        headers:{
          "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
          password
        })

      }
    );

  const data =
    await res.json();

  if(!data.success){

    return alert(
      "Senha incorreta"
    );

  }

  document.getElementById(
    "password-area"
  ).style.display = "none";

  carregarPerguntas();

}

/* =========================
LOAD QUESTIONS
========================= */

async function carregarPerguntas(){

  const res =
    await fetch(
      `/api/quizzes/${quizId}/full`
    );

  perguntas =
    await res.json();

  if(!perguntas.length){

    document.getElementById(
      "quiz"
    ).innerHTML = `

      <div class="question-card">

        <h2>
          Este quiz ainda não possui perguntas.
        </h2>

      </div>

    `;

    document.getElementById(
      "next-btn"
    ).style.display = "none";

    return;

  }

  mostrarPergunta();

}

/* =========================
SHOW QUESTION
========================= */

function mostrarPergunta(){

  const p =
    perguntas[perguntaAtual];

  if(!p){
    return;
  }

  const porcentagem =
    (
      (perguntaAtual + 1)
      /
      perguntas.length
    ) * 100;

  document.getElementById(
    "progress-bar"
  ).style.width =
    `${porcentagem}%`;

  document.getElementById(
    "progress-text"
  ).innerHTML =
    `Pergunta ${perguntaAtual + 1}/${perguntas.length}`;

  document.getElementById(
    "quiz"
  ).innerHTML = `

    <div class="question-card">

      <div class="question-number">

        Pergunta
        ${perguntaAtual + 1}

      </div>

      <div class="question-title">

        ${p.question}

      </div>

      <div class="options">

        ${p.options.map(op => `

          <div
            class="option"
            onclick="
              selecionar(
                ${p.id},
                ${op.id},
                this
              )
            "
          >

            ${op.text}

          </div>

        `).join("")}

      </div>

    </div>

  `;

}

/* =========================
SELECT
========================= */

function selecionar(
  questionId,
  optionId,
  el
){

  respostas[questionId] =
    optionId;

  document
    .querySelectorAll(".option")
    .forEach(op => {

      op.classList.remove(
        "selected"
      );

    });

  el.classList.add(
    "selected"
  );

}

/* =========================
NEXT
========================= */

function proximaPergunta(){

  const p =
    perguntas[perguntaAtual];

  if(!respostas[p.id]){

    return alert(
      "Selecione uma resposta"
    );

  }

  perguntaAtual++;

  if(
    perguntaAtual
    <
    perguntas.length
  ){

    mostrarPergunta();

  }else{

    finalizarQuiz();

  }

}

/* =========================
FINISH
========================= */

async function finalizarQuiz(){

  clearInterval(intervalo);

  let score = 0;

  let detalhes = "";

  const respostasDetalhadas = [];

  for(
    const questionId
    in respostas
  ){

    const optionId =
      respostas[questionId];

    const check =
      await fetch(
        `/api/quizzes/check/${optionId}`
      );

    const checkData =
      await check.json();

    const correta =
      await fetch(
        `/api/quizzes/questions/${questionId}/correct`
      );

    const corretaData =
      await correta.json();

    const pergunta =
      perguntas.find(
        p => p.id == questionId
      );

    const respostaUsuario =
      pergunta.options.find(
        o => o.id == optionId
      );

    const acertou =
      checkData.correct;

    respostasDetalhadas.push({

      question:
        pergunta.question,

      answer:
        respostaUsuario.text,

      correct:
        acertou,

      correct_answer:
        corretaData.text

    });

    if(acertou){

      score++;

      detalhes += `

        <div class="review correct">

          <strong>
            ✅ ${pergunta.question}
          </strong>

          <br><br>

          Sua resposta:
          ${respostaUsuario.text}

        </div>

      `;

    }else{

      detalhes += `

        <div class="review wrong">

          <strong>
            ❌ ${pergunta.question}
          </strong>

          <br><br>

          Sua resposta:
          ${respostaUsuario.text}

          <br><br>

          Correta:
          ${corretaData.text}

        </div>

      `;

    }

  }

  const player_name =
    document.getElementById(
      "player"
    ).value || "Jogador";

  await fetch(
    `/api/quizzes/${quizId}/result`,
    {

      method:"POST",

      headers:{
        "Content-Type":
          "application/json"
      },

      body:JSON.stringify({

        player_name,

        score,

        answers:
          respostasDetalhadas

      })

    }
  );

  document.getElementById(
    "quiz"
  ).innerHTML = "";

  document.getElementById(
    "next-btn"
  ).style.display = "none";

  document.getElementById(
    "resultado"
  ).innerHTML = `

    <div class="result-card">

      <h2>
        Quiz Finalizado
      </h2>

      <div class="score">

        ${score}/${perguntas.length}

      </div>

      <p style="margin-top:18px">

        ⏱️ Tempo:
        ${Math.floor(segundos / 60)}
        min e
        ${segundos % 60}
        seg

      </p>

      <h2 class="ranking-title">
        Revisão
      </h2>

      ${detalhes}

      <div
        id="ranking"
        style="margin-top:35px"
      ></div>

    </div>

  `;

  carregarRanking();

}

/* =========================
RANKING
========================= */

async function carregarRanking(){

  const res =
    await fetch(
      `/api/quizzes/${quizId}/ranking`
    );

  const ranking =
    await res.json();

  const div =
    document.getElementById(
      "ranking"
    );

  div.innerHTML =
    `
      <h2 class="ranking-title">
        Ranking
      </h2>
    `;

  ranking.forEach((r,index)=>{

    div.innerHTML += `

      <div class="ranking-item">

        <strong>
          #${index + 1}
        </strong>

        — ${r.player_name}

        <br><br>

        ${r.score} pontos

      </div>

    `;

  });

}

/* =========================
START
========================= */

async function iniciar(){

  await carregarQuizPorSlug();

  iniciarTimer();

}

iniciar();

</script>

</body>
</html>
