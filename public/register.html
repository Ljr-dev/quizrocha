<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Quiz Rocha</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#020617;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box{
  background:#1e293b;
  padding:30px;
  border-radius:12px;
  width:100%;
  max-width:400px;
}

h1{
  margin-bottom:20px;
  text-align:center;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin-top:10px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  margin-top:20px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

a{
  color:#22c55e;
}

.link{
  text-align:center;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="box">

  <h1>Criar Conta</h1>

  <input
    type="text"
    id="name"
    placeholder="Seu nome"
  >

  <input
    type="email"
    id="email"
    placeholder="Seu email"
  >

  <input
    type="password"
    id="password"
    placeholder="Sua senha"
  >

  <button onclick="register()">
    Criar Conta
  </button>

  <div class="link">
    <a href="/login.html">
      Já tenho conta
    </a>
  </div>

</div>

<script>

async function register(){

  const name =
    document.getElementById("name").value;

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  const res = await fetch(
    "/api/auth/register",
    {
      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify({
        name,
        email,
        password
      })
    }
  );

  const data = await res.json();

  if(data.error){
    return alert(data.error);
  }

  alert("Conta criada!");

  window.location.href =
    "/login.html";

}

</script>

</body>
</html>
