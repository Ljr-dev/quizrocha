<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editar Quiz</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial;
  background:#020617;
  color:white;
  padding:20px;
}

.container{
  max-width:1000px;
  margin:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  gap:20px;
  flex-wrap:wrap;
}

.back{
  background:#334155;
  color:white;
  text-decoration:none;
  padding:10px 15px;
  border-radius:10px;
  font-weight:bold;
}

.question-box{
  background:#1e293b;
  padding:20px;
  border-radius:16px;
  margin-top:20px;
}

.question-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.delete-question{
  background:#ef4444;
  color:white;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin-top:15px;
  background:#f1f5f9;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin-top:15px;
  font-weight:bold;
  cursor:pointer;
}

.add-btn{
  background:#22c55e;
  color:black;
}

.option{
  background:#0f172a;
  padding:15px;
  border-radius:10px;
  margin-top:10px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.correct{
  color:#22c55e;
  font-weight:bold;
}

.delete-option{
  background:#ef4444;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

.checkbox-area{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:15px;
}

.checkbox{
  width:auto;
}

</style>
</head>

<body>

<div class="container">

  <div class="topbar">

    <h1>Editar Quiz</h1>

    <a
      href="/dashboard.html"
      class="back"
    >
      ← Dashboard
    </a>

  </div>



  <input
    type="text"
    id="question"
    placeholder="Digite a pergunta"
  >

  <button
    class="add-btn"
    onclick="adicionarPergunta()"
  >
    Adicionar Pergunta
  </button>



  <div id="questions"></div>

</div>

<script>

const token =
  localStorage.getItem("token");

const user =
  JSON.parse(localStorage.getItem("user"));

if(!token || !user){

  window.location.href =
    "/login.html";

}

const params =
  new URLSearchParams(window.location.search);

const quizId = params.get("id");



async function verificarPermissao(){

  const res = await fetch(
    `/api/quizzes/${quizId}/check-owner`,
    {
      headers:{
        Authorization:`Bearer ${token}`
      }
    }
  );

  const data = await res.json();

  if(!data.owner){

    alert("Sem permissão");

    window.location.href =
      "/dashboard.html";

  }

}



async function carregarPerguntas(){

  const res = await fetch(
    `/api/quizzes/${quizId}/questions`
  );

  const perguntas = await res.json();

  const div =
    document.getElementById("questions");

  div.innerHTML = "";



  perguntas.forEach(p => {

    div.innerHTML += `

      <div class="question-box">

        <div class="question-title">

          <h3>${p.question}</h3>

          <button
            class="delete-question"
            onclick="deletarPergunta(${p.id})"
          >
            🗑️
          </button>

        </div>



        <input
          type="text"
          id="option-${p.id}"
          placeholder="Digite a alternativa"
        >



        <div class="checkbox-area">

          <input
            type="checkbox"
            class="checkbox"
            id="correct-${p.id}"
          >

          <span>
            Alternativa correta
          </span>

        </div>



        <button
          class="add-btn"
          onclick="adicionarAlternativa(${p.id})"
        >
          Adicionar Alternativa
        </button>



        <div id="options-${p.id}"></div>

      </div>

    `;

    carregarAlternativas(p.id);

  });

}



async function adicionarPergunta(){

  const question =
    document.getElementById("question").value;

  if(!question){
    return alert("Digite uma pergunta");
  }

  await fetch(
    `/api/quizzes/${quizId}/questions`,
    {
      method:"POST",

      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },

      body: JSON.stringify({
        question
      })
    }
  );

  document.getElementById("question").value = "";

  carregarPerguntas();

}



async function deletarPergunta(id){

  const confirmar =
    confirm(
      "Excluir pergunta?"
    );

  if(!confirmar) return;

  await fetch(
    `/api/quizzes/questions/${id}`,
    {
      method:"DELETE",

      headers:{
        Authorization:`Bearer ${token}`
      }
    }
  );

  carregarPerguntas();

}



async function adicionarAlternativa(questionId){

  const text =
    document.getElementById(
      `option-${questionId}`
    ).value;

  const is_correct =
    document.getElementById(
      `correct-${questionId}`
    ).checked ? 1 : 0;

  if(!text){
    return alert("Digite alternativa");
  }

  await fetch(
    `/api/quizzes/questions/${questionId}/options`,
    {
      method:"POST",

      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${token}`
      },

      body: JSON.stringify({
        text,
        is_correct
      })
    }
  );

  document.getElementById(
    `option-${questionId}`
  ).value = "";

  document.getElementById(
    `correct-${questionId}`
  ).checked = false;

  carregarAlternativas(questionId);

}



async function deletarAlternativa(id){

  const confirmar =
    confirm(
      "Excluir alternativa?"
    );

  if(!confirmar) return;

  await fetch(
    `/api/quizzes/options/${id}`,
    {
      method:"DELETE",

      headers:{
        Authorization:`Bearer ${token}`
      }
    }
  );

  carregarPerguntas();

}



async function carregarAlternativas(questionId){

  const res = await fetch(
    `/api/quizzes/questions/${questionId}/options`
  );

  const options = await res.json();

  const div =
    document.getElementById(
      `options-${questionId}`
    );

  div.innerHTML = "";



  options.forEach(op => {

    div.innerHTML += `

      <div class="option">

        <div>

          ${op.text}

          ${
            op.is_correct
            ? '<span class="correct"> ✅ Correta</span>'
            : ''
          }

        </div>

        <button
          class="delete-option"
          onclick="deletarAlternativa(${op.id})"
        >
          ✖
        </button>

      </div>

    `;

  });

}



verificarPermissao();

carregarPerguntas();

</script>

</body>
</html>
