<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>
Login - Quiz Rocha
</title>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
/>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
/>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
  rel="stylesheet"
/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#020617;

  --card:#0f172a;

  --card2:#1e293b;

  --border:rgba(255,255,255,.06);

  --text:#ffffff;

  --muted:#94a3b8;

  --green:#22c55e;

  --green-dark:#16a34a;

  --blue:#3b82f6;

}

body{

  font-family:'Inter',sans-serif;

  background:
    radial-gradient(
      circle at top,
      #0f172a 0%,
      #020617 65%
    );

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

  padding:20px;

  color:white;

  overflow:hidden;

}

/* =========================
BACKGROUND
========================= */

.bg-effect{

  position:absolute;

  width:700px;
  height:700px;

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      rgba(37,99,235,.18),
      transparent 70%
    );

  top:-250px;
  right:-250px;

}

/* =========================
LOGIN BOX
========================= */

.login-wrapper{

  position:relative;

  z-index:2;

  width:100%;

  max-width:460px;

}

.box{

  background:
    linear-gradient(
      180deg,
      rgba(30,41,59,.98),
      rgba(15,23,42,.98)
    );

  border:
    1px solid rgba(255,255,255,.06);

  border-radius:34px;

  padding:40px;

  box-shadow:
    0 30px 70px rgba(0,0,0,.35);

  backdrop-filter:blur(12px);

}

/* =========================
LOGO
========================= */

.logo{

  width:80px;
  height:80px;

  border-radius:24px;

  margin:auto;

  display:flex;

  align-items:center;

  justify-content:center;

  font-size:38px;

  font-weight:900;

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #2563eb
    );

  box-shadow:
    0 15px 40px rgba(37,99,235,.35);

}

/* =========================
TEXT
========================= */

h1{

  text-align:center;

  margin-top:26px;

  font-size:42px;

  font-weight:900;

}

.subtitle{

  text-align:center;

  color:#94a3b8;

  margin-top:12px;

  line-height:1.7;

  font-size:15px;

}

/* =========================
FORM
========================= */

.form{

  margin-top:34px;

}

.input-group{
  margin-bottom:20px;
}

.label{

  display:block;

  margin-bottom:10px;

  color:#cbd5e1;

  font-size:14px;

  font-weight:600;

}

input{

  width:100%;

  border:none;

  outline:none;

  border-radius:18px;

  padding:18px;

  background:#f8fafc;

  font-size:16px;

  transition:.2s;

}

input:focus{

  transform:scale(1.01);

}

/* =========================
BUTTON
========================= */

button{

  width:100%;

  border:none;

  cursor:pointer;

  border-radius:18px;

  padding:18px;

  margin-top:12px;

  font-size:16px;

  font-weight:800;

  transition:.2s;

  background:
    linear-gradient(
      135deg,
      #22c55e,
      #16a34a
    );

  color:black;

}

button:hover{
  transform:translateY(-2px);
}

/* =========================
BOTTOM
========================= */

.bottom{

  margin-top:28px;

  text-align:center;

  color:#94a3b8;

  font-size:15px;

}

.bottom a{

  color:#4ade80;

  text-decoration:none;

  font-weight:700;

}

/* =========================
FEATURES
========================= */

.features{

  margin-top:30px;

  display:grid;

  grid-template-columns:
    repeat(2,1fr);

  gap:14px;

}

.feature{

  background:
    rgba(255,255,255,.04);

  border-radius:18px;

  padding:18px;

  text-align:center;

}

.feature strong{

  display:block;

  margin-top:8px;

  font-size:14px;

}

.feature span{

  display:block;

  margin-top:5px;

  color:#94a3b8;

  font-size:12px;

  line-height:1.5;

}

/* =========================
RESPONSIVO
========================= */

@media(max-width:768px){

  .box{

    padding:30px 24px;

    border-radius:28px;

  }

  h1{
    font-size:34px;
  }

  .logo{

    width:70px;
    height:70px;

    font-size:34px;

  }

}

@media(max-width:480px){

  body{
    padding:14px;
  }

  .box{
    padding:26px 20px;
  }

  h1{
    font-size:30px;
  }

  .subtitle{
    font-size:14px;
  }

  input{
    padding:16px;
    font-size:15px;
  }

  button{
    padding:16px;
  }

  .features{
    grid-template-columns:1fr;
  }

}

</style>

</head>

<body>

<div class="bg-effect"></div>

<div class="login-wrapper">

  <div class="box">

    <!-- LOGO -->

    <div class="logo">
      Q
    </div>

    <!-- TEXT -->

    <h1>
      Bem-vindo
    </h1>

    <div class="subtitle">

      Entre na sua conta para criar
      quizzes profissionais e acessar
      seu painel completo.

    </div>

    <!-- FORM -->

    <div class="form">

      <div class="input-group">

        <label class="label">
          Seu email
        </label>

        <input
          type="email"
          id="email"
          placeholder="Digite seu email"
        >

      </div>

      <div class="input-group">

        <label class="label">
          Sua senha
        </label>

        <input
          type="password"
          id="password"
          placeholder="Digite sua senha"
        >

      </div>

      <button onclick="login()">
        🚀 Entrar
      </button>

    </div>

    <!-- FEATURES -->

    <div class="features">

      <div class="feature">

        🏆

        <strong>
          Ranking
        </strong>

        <span>
          Acompanhe jogadores
        </span>

      </div>

      <div class="feature">

        📊

        <strong>
          Relatórios
        </strong>

        <span>
          Estatísticas avançadas
        </span>

      </div>

      <div class="feature">

        🔒

        <strong>
          Privacidade
        </strong>

        <span>
          Quiz protegido por senha
        </span>

      </div>

      <div class="feature">

        ⚡

        <strong>
          Tempo Real
        </strong>

        <span>
          Resultados instantâneos
        </span>

      </div>

    </div>

    <!-- BOTTOM -->

    <div class="bottom">

      Não possui conta?

      <a href="/register.html">
        Criar conta
      </a>

    </div>

  </div>

</div>

<script>

async function login(){

  const email =
    document.getElementById(
      "email"
    ).value;

  const password =
    document.getElementById(
      "password"
    ).value;

  if(!email || !password){

    return alert(
      "Preencha email e senha"
    );

  }

  try{

    const res =
      await fetch(
        "/api/auth/login",
        {

          method:"POST",

          headers:{
            "Content-Type":
              "application/json"
          },

          body:JSON.stringify({
            email,
            password
          })

        }
      );

    const data =
      await res.json();

    if(data.error){

      return alert(
        data.error
      );

    }

    localStorage.setItem(
      "token",
      data.token
    );

    localStorage.setItem(
      "user",
      JSON.stringify(data.user)
    );

    window.location.href =
      "/dashboard.html";

  }catch(err){

    console.error(err);

    alert(
      "Erro ao fazer login"
    );

  }

}

</script>

</body>
</html>
