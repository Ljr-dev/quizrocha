<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Editor de Quiz</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#020617;
  color:white;
  padding:30px;
}



/* =========================
   LAYOUT
========================= */

.container{
  max-width:1100px;
  margin:auto;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:35px;
  gap:20px;
  flex-wrap:wrap;
}

.title{
  font-size:38px;
  font-weight:bold;
}

.back-btn{
  background:#334155;
  color:white;
  text-decoration:none;
  padding:14px 20px;
  border-radius:12px;
  font-weight:bold;
}



/* =========================
   CARD
========================= */

.card{
  background:#1e293b;
  border-radius:22px;
  padding:25px;
  margin-bottom:25px;
}



/* =========================
   INPUTS
========================= */

input{
  width:100%;
  border:none;
  outline:none;
  border-radius:14px;
  padding:16px;
  margin-top:15px;
  background:#f1f5f9;
  font-size:16px;
}



/* =========================
   BUTTONS
========================= */

button{
  border:none;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

.primary-btn{
  width:100%;
  background:#22c55e;
  color:black;
  padding:16px;
  border-radius:14px;
  margin-top:15px;
  font-size:15px;
}

.delete-btn{
  background:#ef4444;
  color:white;
  padding:12px 16px;
  border-radius:12px;
  white-space:nowrap;
}

.delete-option{
  width:42px;
  height:42px;
  border-radius:10px;
  background:#ef4444;
  color:white;
  font-size:18px;
}



/* =========================
   QUESTION
========================= */

.question-box{
  background:#111827;
  border-radius:20px;
  padding:25px;
  margin-top:20px;
}

.question-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.question-title{
  font-size:24px;
  font-weight:bold;
}



/* =========================
   OPTION FORM
========================= */

.option-form{
  display:flex;
  gap:15px;
  align-items:center;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.option-form input[type="text"]{
  flex:1;
  margin-top:0;
}

.correct-box{
  display:flex;
  align-items:center;
  gap:10px;
  background:#020617;
  padding:14px 16px;
  border-radius:12px;
  min-width:180px;
}

.correct-box input{
  width:auto;
  margin:0;
}



/* =========================
   OPTIONS
========================= */

.option{
  background:#020617;
  border-radius:16px;
  padding:18px;
  margin-top:14px;

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:15px;
}

.option-left{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.option-text{
  font-size:18px;
}

.correct{
  color:#22c55e;
  font-weight:bold;
}



/* =========================
   RESPONSIVO
========================= */

@media(max-width:700px){

  body{
    padding:18px;
  }

  .title{
    font-size:30px;
  }

  .option-form{
    flex-direction:column;
    align-items:stretch;
  }

  .correct-box{
    width:100%;
  }

  .question-header{
    flex-direction:column;
    align-items:flex-start;
  }

  .delete-btn{
    width:100%;
  }

}

</style>

</head>

<body>

<div class="container">

  <div class="topbar">

    <div class="title">
      Editar Quiz
    </div>

    <a
      href="/dashboard.html"
      class="back-btn"
    >
      ← Dashboard
    </a>

  </div>



  <!-- NOVA PERGUNTA -->

  <div class="card">

    <input
      type="text"
      id="question"
      placeholder="Digite a pergunta"
    >

    <button
      class="primary-btn"
      onclick="adicionarPergunta()"
    >
      Adicionar Pergunta
    </button>

  </div>



  <!-- LISTA -->

  <div id="questions"></div>

</div>

<script>

const token =
  localStorage.getItem("token");

const user =
  JSON.parse(
    localStorage.getItem("user")
  );



if(!token || !user){

  window.location.href =
    "/";

}



const params =
  new URLSearchParams(
    window.location.search
  );

const quizId =
  params.get("id");



/* =========================
   CHECK OWNER
========================= */

async function verificarPermissao(){

  const res = await fetch(
    `/api/quizzes/${quizId}/check-owner`,
    {
      headers:{
        Authorization:
          `Bearer ${token}`
      }
    }
  );

  const data =
    await res.json();



  if(!data.owner){

    alert("Sem permissão");

    window.location.href =
      "/dashboard.html";

  }

}



/* =========================
   CARREGAR PERGUNTAS
========================= */

async function carregarPerguntas(){

  const res = await fetch(
    `/api/quizzes/${quizId}/questions`
  );

  const perguntas =
    await res.json();

  const div =
    document.getElementById(
      "questions"
    );



  div.innerHTML = "";



  perguntas.forEach((p) => {

    div.innerHTML += `

      <div class="question-box">

        <div class="question-header">

          <div class="question-title">
            ${p.question}
          </div>

          <button
            class="delete-btn"
            onclick="deletarPergunta(${p.id})"
          >
            Excluir Pergunta
          </button>

        </div>



        <div class="option-form">

          <input
            type="text"
            id="option-${p.id}"
            placeholder="Digite a alternativa"
          >

          <div class="correct-box">

            <input
              type="checkbox"
              id="correct-${p.id}"
            >

            <span>
              Correta
            </span>

          </div>

        </div>



        <button
          class="primary-btn"
          onclick="adicionarAlternativa(${p.id})"
        >
          Adicionar Alternativa
        </button>



        <div id="options-${p.id}"></div>

      </div>

    `;

    carregarAlternativas(p.id);

  });

}



/* =========================
   ADD QUESTION
========================= */

async function adicionarPergunta(){

  const question =
    document.getElementById(
      "question"
    ).value;



  if(!question){

    return alert(
      "Digite uma pergunta"
    );

  }



  await fetch(
    `/api/quizzes/${quizId}/questions`,
    {

      method:"POST",

      headers:{
        "Content-Type":
          "application/json",

        Authorization:
          `Bearer ${token}`
      },

      body:JSON.stringify({
        question
      })

    }
  );



  document.getElementById(
    "question"
  ).value = "";



  carregarPerguntas();

}



/* =========================
   DELETE QUESTION
========================= */

async function deletarPergunta(id){

  const confirmar =
    confirm(
      "Excluir pergunta?"
    );

  if(!confirmar){
    return;
  }



  await fetch(
    `/api/quizzes/questions/${id}`,
    {

      method:"DELETE",

      headers:{
        Authorization:
          `Bearer ${token}`
      }

    }
  );



  carregarPerguntas();

}



/* =========================
   ADD OPTION
========================= */

async function adicionarAlternativa(questionId){

  const text =
    document.getElementById(
      `option-${questionId}`
    ).value;

  const is_correct =
    document.getElementById(
      `correct-${questionId}`
    ).checked ? 1 : 0;



  if(!text){

    return alert(
      "Digite alternativa"
    );

  }



  await fetch(
    `/api/quizzes/questions/${questionId}/options`,
    {

      method:"POST",

      headers:{
        "Content-Type":
          "application/json",

        Authorization:
          `Bearer ${token}`
      },

      body:JSON.stringify({
        text,
        is_correct
      })

    }
  );



  document.getElementById(
    `option-${questionId}`
  ).value = "";



  document.getElementById(
    `correct-${questionId}`
  ).checked = false;



  carregarAlternativas(questionId);

}



/* =========================
   DELETE OPTION
========================= */

async function deletarAlternativa(id){

  const confirmar =
    confirm(
      "Excluir alternativa?"
    );

  if(!confirmar){
    return;
  }



  await fetch(
    `/api/quizzes/options/${id}`,
    {

      method:"DELETE",

      headers:{
        Authorization:
          `Bearer ${token}`
      }

    }
  );



  carregarPerguntas();

}



/* =========================
   LOAD OPTIONS
========================= */

async function carregarAlternativas(questionId){

  const res = await fetch(
    `/api/quizzes/questions/${questionId}/options`
  );

  const options =
    await res.json();

  const div =
    document.getElementById(
      `options-${questionId}`
    );



  div.innerHTML = "";



  options.forEach((op) => {

    div.innerHTML += `

      <div class="option">

        <div class="option-left">

          <span class="option-text">
            ${op.text}
          </span>

          ${
            op.is_correct
            ? `
              <span class="correct">
                ✅ Correta
              </span>
            `
            : ""
          }

        </div>

        <button
          class="delete-option"
          onclick="deletarAlternativa(${op.id})"
        >
          ✕
        </button>

      </div>

    `;

  });

}



verificarPermissao();

carregarPerguntas();

</script>

</body>
</html>
