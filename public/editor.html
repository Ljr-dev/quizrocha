<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Editor de Quiz</title>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#020617;

  --card:#111827;

  --card2:#1e293b;

  --border:rgba(255,255,255,.06);

  --text:#ffffff;

  --muted:#94a3b8;

  --green:#22c55e;

  --green-dark:#16a34a;

  --red:#ef4444;

  --red-dark:#dc2626;

  --blue:#3b82f6;

  --blue-dark:#2563eb;

}

body{

  font-family:'Inter',sans-serif;

  background:
    radial-gradient(
      circle at top,
      #0f172a 0%,
      #020617 65%
    );

  color:white;

  min-height:100vh;

  padding:22px;

}

.container{
  max-width:1200px;
  margin:auto;
}

/* =========================
TOPBAR
========================= */

.topbar{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  flex-wrap:wrap;

  margin-bottom:30px;

}

.title{

  font-size:42px;

  font-weight:800;

}

.back-btn{

  text-decoration:none;

  background:
    linear-gradient(
      135deg,
      var(--blue),
      var(--blue-dark)
    );

  color:white;

  padding:15px 22px;

  border-radius:18px;

  font-weight:700;

  transition:.2s;

}

.back-btn:hover{
  transform:translateY(-2px);
}

/* =========================
CARD
========================= */

.card{

  background:
    linear-gradient(
      180deg,
      rgba(30,41,59,.98),
      rgba(15,23,42,.98)
    );

  border:1px solid var(--border);

  border-radius:30px;

  padding:28px;

  margin-bottom:28px;

  box-shadow:
    0 20px 50px rgba(0,0,0,.3);

}

/* =========================
INPUTS
========================= */

input{

  width:100%;

  border:none;

  outline:none;

  border-radius:18px;

  padding:18px;

  background:#f8fafc;

  font-size:16px;

}

.input-label{

  display:block;

  margin-bottom:12px;

  color:var(--muted);

  font-size:14px;

  font-weight:600;

}

/* =========================
BUTTONS
========================= */

button{

  border:none;

  cursor:pointer;

  transition:.2s;

  font-weight:700;

}

button:hover{
  transform:translateY(-2px);
}

.primary-btn{

  width:100%;

  background:
    linear-gradient(
      135deg,
      var(--green),
      var(--green-dark)
    );

  color:#04130a;

  padding:18px;

  border-radius:18px;

  margin-top:18px;

  font-size:16px;

  font-weight:800;

}

.delete-btn{

  background:
    linear-gradient(
      135deg,
      var(--red),
      var(--red-dark)
    );

  color:white;

  padding:14px 18px;

  border-radius:16px;

  white-space:nowrap;

}

.delete-option{

  width:46px;
  height:46px;

  border-radius:14px;

  background:
    linear-gradient(
      135deg,
      var(--red),
      var(--red-dark)
    );

  color:white;

  font-size:18px;

  flex-shrink:0;

}

/* =========================
QUESTION BOX
========================= */

.question-box{

  background:
    linear-gradient(
      180deg,
      rgba(17,24,39,.95),
      rgba(15,23,42,.98)
    );

  border:1px solid rgba(255,255,255,.05);

  border-radius:28px;

  padding:26px;

  margin-top:24px;

}

.question-header{

  display:flex;

  justify-content:space-between;

  align-items:flex-start;

  gap:20px;

  flex-wrap:wrap;

  margin-bottom:22px;

}

.question-title{

  font-size:26px;

  font-weight:800;

  line-height:1.4;

}

/* =========================
OPTION FORM
========================= */

.option-form{

  display:flex;

  gap:15px;

  align-items:center;

  margin-bottom:20px;

  flex-wrap:wrap;

}

.option-form input[type="text"]{

  flex:1;

}

.correct-box{

  display:flex;

  align-items:center;

  gap:10px;

  background:#020617;

  padding:16px 18px;

  border-radius:16px;

  min-width:180px;

  border:1px solid rgba(255,255,255,.05);

}

.correct-box input{

  width:auto;

  margin:0;

  transform:scale(1.2);

}

/* =========================
OPTIONS
========================= */

.option{

  background:#020617;

  border:1px solid rgba(255,255,255,.05);

  border-radius:20px;

  padding:18px;

  margin-top:16px;

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:15px;

}

.option-left{

  display:flex;

  align-items:center;

  gap:12px;

  flex-wrap:wrap;

}

.option-text{

  font-size:18px;

  line-height:1.5;

}

.correct{

  color:#4ade80;

  font-weight:700;

}

/* =========================
EMPTY
========================= */

.empty{

  padding:60px 20px;

  text-align:center;

  border-radius:24px;

  border:1px dashed rgba(255,255,255,.08);

}

/* =========================
RESPONSIVO
========================= */

@media(max-width:900px){

  .question-header{

    flex-direction:column;

    align-items:flex-start;

  }

}

@media(max-width:768px){

  body{
    padding:14px;
  }

  .topbar{

    flex-direction:column;

    align-items:flex-start;

    gap:18px;

  }

  .title{
    font-size:32px;
  }

  .back-btn{
    width:100%;
    text-align:center;
  }

  .card{
    padding:22px;
    border-radius:24px;
  }

  .question-box{
    padding:22px;
    border-radius:24px;
  }

  .question-title{
    font-size:22px;
  }

  .option-form{

    flex-direction:column;

    align-items:stretch;

  }

  .correct-box{
    width:100%;
  }

  .delete-btn{
    width:100%;
  }

  .option{

    flex-direction:column;

    align-items:flex-start;

  }

  .delete-option{
    width:100%;
    height:auto;
    padding:14px;
  }

}

@media(max-width:480px){

  body{
    padding:12px;
  }

  .title{
    font-size:28px;
  }

  .card{
    padding:18px;
  }

  .question-box{
    padding:18px;
  }

  .question-title{
    font-size:20px;
  }

  input{
    padding:16px;
    font-size:15px;
  }

  .primary-btn{
    padding:16px;
  }

  .option-text{
    font-size:16px;
  }

}

</style>

</head>

<body>

<div class="container">

  <div class="topbar">

    <div class="title">
      Editar Quiz
    </div>

    <a
      href="/dashboard.html"
      class="back-btn"
    >
      ← Dashboard
    </a>

  </div>

  <!-- NOVA PERGUNTA -->

  <div class="card">

    <label class="input-label">
      Nova Pergunta
    </label>

    <input
      type="text"
      id="question"
      placeholder="Digite a pergunta"
    >

    <button
      class="primary-btn"
      onclick="adicionarPergunta()"
    >
      Adicionar Pergunta
    </button>

  </div>

  <!-- LISTA -->

  <div id="questions"></div>

</div>

<script>

const token =
  localStorage.getItem("token");

const user =
  JSON.parse(
    localStorage.getItem("user")
  );

if(!token || !user){

  window.location.href =
    "/";

}

const params =
  new URLSearchParams(
    window.location.search
  );

const quizId =
  params.get("id");

/* =========================
CHECK OWNER
========================= */

async function verificarPermissao(){

  const res =
    await fetch(
      `/api/quizzes/${quizId}/check-owner`,
      {
        headers:{
          Authorization:
            `Bearer ${token}`
        }
      }
    );

  const data =
    await res.json();

  if(!data.owner){

    alert("Sem permissão");

    window.location.href =
      "/dashboard.html";

  }

}

/* =========================
LOAD QUESTIONS
========================= */

async function carregarPerguntas(){

  const res =
    await fetch(
      `/api/quizzes/${quizId}/questions`
    );

  const perguntas =
    await res.json();

  const div =
    document.getElementById(
      "questions"
    );

  div.innerHTML = "";

  if(!perguntas.length){

    div.innerHTML = `

      <div class="card empty">

        <h2>
          Nenhuma pergunta criada
        </h2>

        <p style="margin-top:12px;color:#94a3b8;">
          Adicione a primeira pergunta do quiz.
        </p>

      </div>

    `;

    return;

  }

  perguntas.forEach((p)=>{

    div.innerHTML += `

      <div class="question-box">

        <div class="question-header">

          <div class="question-title">
            ${p.question}
          </div>

          <button
            class="delete-btn"
            onclick="deletarPergunta(${p.id})"
          >
            Excluir Pergunta
          </button>

        </div>

        <div class="option-form">

          <input
            type="text"
            id="option-${p.id}"
            placeholder="Digite a alternativa"
          >

          <div class="correct-box">

            <input
              type="checkbox"
              id="correct-${p.id}"
            >

            <span>
              Correta
            </span>

          </div>

        </div>

        <button
          class="primary-btn"
          onclick="adicionarAlternativa(${p.id})"
        >
          Adicionar Alternativa
        </button>

        <div id="options-${p.id}"></div>

      </div>

    `;

    carregarAlternativas(p.id);

  });

}

/* =========================
ADD QUESTION
========================= */

async function adicionarPergunta(){

  const question =
    document.getElementById(
      "question"
    ).value;

  if(!question){

    return alert(
      "Digite uma pergunta"
    );

  }

  await fetch(
    `/api/quizzes/${quizId}/questions`,
    {

      method:"POST",

      headers:{
        "Content-Type":
          "application/json",

        Authorization:
          `Bearer ${token}`
      },

      body:JSON.stringify({
        question
      })

    }
  );

  document.getElementById(
    "question"
  ).value = "";

  carregarPerguntas();

}

/* =========================
DELETE QUESTION
========================= */

async function deletarPergunta(id){

  const confirmar =
    confirm(
      "Excluir pergunta?"
    );

  if(!confirmar){
    return;
  }

  await fetch(
    `/api/quizzes/questions/${id}`,
    {

      method:"DELETE",

      headers:{
        Authorization:
          `Bearer ${token}`
      }

    }
  );

  carregarPerguntas();

}

/* =========================
ADD OPTION
========================= */

async function adicionarAlternativa(questionId){

  const text =
    document.getElementById(
      `option-${questionId}`
    ).value;

  const is_correct =
    document.getElementById(
      `correct-${questionId}`
    ).checked ? 1 : 0;

  if(!text){

    return alert(
      "Digite alternativa"
    );

  }

  await fetch(
    `/api/quizzes/questions/${questionId}/options`,
    {

      method:"POST",

      headers:{
        "Content-Type":
          "application/json",

        Authorization:
          `Bearer ${token}`
      },

      body:JSON.stringify({
        text,
        is_correct
      })

    }
  );

  document.getElementById(
    `option-${questionId}`
  ).value = "";

  document.getElementById(
    `correct-${questionId}`
  ).checked = false;

  carregarAlternativas(questionId);

}

/* =========================
DELETE OPTION
========================= */

async function deletarAlternativa(id){

  const confirmar =
    confirm(
      "Excluir alternativa?"
    );

  if(!confirmar){
    return;
  }

  await fetch(
    `/api/quizzes/options/${id}`,
    {

      method:"DELETE",

      headers:{
        Authorization:
          `Bearer ${token}`
      }

    }
  );

  carregarPerguntas();

}

/* =========================
LOAD OPTIONS
========================= */

async function carregarAlternativas(questionId){

  const res =
    await fetch(
      `/api/quizzes/questions/${questionId}/options`
    );

  const options =
    await res.json();

  const div =
    document.getElementById(
      `options-${questionId}`
    );

  div.innerHTML = "";

  options.forEach((op)=>{

    div.innerHTML += `

      <div class="option">

        <div class="option-left">

          <span class="option-text">
            ${op.text}
          </span>

          ${
            op.is_correct

            ? `
              <span class="correct">
                ✅ Correta
              </span>
            `

            : ""

          }

        </div>

        <button
          class="delete-option"
          onclick="deletarAlternativa(${op.id})"
        >
          ✕
        </button>

      </div>

    `;

  });

}

verificarPermissao();

carregarPerguntas();

</script>

</body>
</html>
