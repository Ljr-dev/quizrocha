<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Admin Master</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020617;
  color:white;
  font-family:Arial;
  padding:20px;
}

/* LOGIN */

.login{
  max-width:400px;
  margin:80px auto;
  background:#0f172a;
  padding:30px;
  border-radius:20px;
}

input{
  width:100%;
  height:45px;
  margin-top:10px;
  background:#111827;
  border:none;
  border-radius:10px;
  padding:0 15px;
  color:white;
}

button{
  width:100%;
  height:50px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.panel{
  display:none;
}

.title{
  font-size:42px;
  margin-bottom:20px;
  font-weight:bold;
}

/* TABELAS */

.tables{
  display:grid;
  grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.table-btn{
  background:#0f172a;
  padding:18px;
  border-radius:14px;
  cursor:pointer;
  text-align:center;
  transition:.2s;
  border:1px solid transparent;
}

.table-btn:hover{
  border-color:#38bdf8;
  transform:translateY(-2px);
}

/* SEARCH */

.search-container{
  margin-bottom:20px;
}

.search-input{
  width:100%;
  height:50px;
  border:none;
  border-radius:12px;
  background:#0f172a;
  color:white;
  padding:0 20px;
  font-size:15px;
}

/* TABLE */

.table-wrapper{
  overflow:auto;
  background:#0f172a;
  border-radius:20px;
  border:1px solid #1e293b;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:900px;
}

th{
  background:#111827;
  padding:14px;
  text-align:left;
  color:#38bdf8;
  font-size:14px;
  position:sticky;
  top:0;
}

td{
  padding:14px;
  border-bottom:1px solid #1e293b;
  font-size:14px;
}

tr:hover{
  background:#111827;
}

/* FILTERS */

.filter-row input{
  width:100%;
  height:36px;
  margin:0;
  border-radius:8px;
  background:#020617;
  border:1px solid #1e293b;
  padding:0 10px;
  font-size:13px;
}

.badge{
  background:#38bdf8;
  color:#000;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

@media(max-width:768px){

  .title{
    font-size:30px;
  }

  .tables{
    grid-template-columns:1fr 1fr;
  }

}

</style>

</head>

<body>

<!-- LOGIN -->

<div
  class="login"
  id="login"
>

  <h1 style="margin-bottom:20px;">
    Admin Master
  </h1>

  <input
    type="password"
    id="password"
    placeholder="Senha master"
  >

  <button onclick="login()">
    Entrar
  </button>

</div>



<!-- PANEL -->

<div
  class="panel"
  id="panel"
>

  <div class="title">
    Painel Admin
  </div>



  <!-- BOTÕES -->

  <div
    class="tables"
    id="tables"
  ></div>



  <!-- SEARCH -->

  <div class="search-container">

    <input
      type="text"
      id="globalSearch"
      class="search-input"
      placeholder="Pesquisar..."
      onkeyup="filtrarTabela()"
    >

  </div>



  <!-- TABLE -->

  <div class="table-wrapper">

    <table id="table">

      <thead id="thead"></thead>

      <tbody id="tbody"></tbody>

    </table>

  </div>

</div>



<script>

let tabelaAtual = [];

let colunasAtuais = [];



/* ======================================
   LOGIN
====================================== */

async function login(){

  const password =
    document.getElementById("password").value;

  const response =
    await fetch("/admin/login",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({
        password
      })

    });

  const data =
    await response.json();

  if(!data.success){

    alert("Senha inválida");

    return;
  }

  document.getElementById("login")
    .style.display = "none";

  document.getElementById("panel")
    .style.display = "block";

  carregarTabelas();

}



/* ======================================
   TABELAS
====================================== */

async function carregarTabelas(){

  const tabelas = [

    "users",
    "questions",
    "quizzes",
    "results"

  ];

  const container =
    document.getElementById("tables");

  container.innerHTML = "";

  tabelas.forEach(nome=>{

    container.innerHTML += `

      <div
        class="table-btn"
        onclick="carregarTabela('${nome}')"
      >
        📁 ${nome}
      </div>

    `;

  });

}



/* ======================================
   CARREGAR TABELA
====================================== */

async function carregarTabela(nome){

  const response =
    await fetch(`/admin/table/${nome}`);

  const result =
    await response.json();

  tabelaAtual =
    result.data || [];

  if(!tabelaAtual.length){

    return;
  }

  colunasAtuais =
    Object.keys(tabelaAtual[0]);

  renderizarTabela(tabelaAtual);

}


/* ======================================
   RENDER TABLE
====================================== */

function renderizarTabela(data){

  // criar opções únicas por coluna

  const valoresUnicos = {};

  colunasAtuais.forEach(col=>{

    valoresUnicos[col] = [

      ...new Set(
        tabelaAtual.map(row=>
          row[col]
        )
      )

    ];

  });



  document.getElementById("thead").innerHTML = `

    <tr>

      ${colunasAtuais.map(col=>`
        <th>${col}</th>
      `).join("")}

    </tr>

    <tr class="filter-row">

      ${colunasAtuais.map(col=>`

        <th>

          <select
            onchange="filtrarTabela()"
            data-column="${col}"
            style="
              width:100%;
              height:36px;
              border:none;
              border-radius:8px;
              background:#020617;
              color:white;
              padding:0 10px;
              border:1px solid #1e293b;
            "
          >

            <option value="">
              Todos
            </option>

            ${valoresUnicos[col]
              .filter(v=>v !== null)
              .map(valor=>`

                <option value="${valor}">
                  ${valor}
                </option>

              `).join("")
            }

          </select>

        </th>

      `).join("")}

    </tr>

  `;



  document.getElementById("tbody").innerHTML =

    data.map(row=>`

      <tr>

        ${colunasAtuais.map(col=>`

          <td>

            ${formatarValor(row[col])}

          </td>

        `).join("")}

      </tr>

    `).join("");

}



/* ======================================
   FILTRAR
====================================== */

function filtrarTabela(){

  const selects =
    document.querySelectorAll(
      ".filter-row select"
    );



  const filtrados =
    tabelaAtual.filter(row=>{

      let passou = true;



      selects.forEach(select=>{

        const coluna =
          select.dataset.column;

        const valor =
          select.value;

        if(valor){

          if(
            String(row[coluna]) !== valor
          ){

            passou = false;

          }

        }

      });



      return passou;

    });



  renderizarTabela(filtrados);

}


/* ======================================
   FORMATAR
====================================== */

function formatarValor(valor){

  if(valor === null){

    return "-";

  }

  if(

    typeof valor === "boolean" ||

    valor === 0 ||

    valor === 1

  ){

    return `
      <span class="badge">
        ${valor}
      </span>
    `;

  }

  return valor;

}

</script>

</body>
</html>
