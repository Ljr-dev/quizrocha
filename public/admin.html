<!-- public/admin.html -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Admin Master - Quiz Rocha</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020617;
  color:white;
  font-family:Arial;
}

.login{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.login-box{
  width:100%;
  max-width:400px;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:15px;
  padding:30px;
}

.login-box h1{
  margin-bottom:20px;
  color:#38bdf8;
  text-align:center;
}

input{
  width:100%;
  height:50px;
  border:none;
  outline:none;
  border-radius:10px;
  padding:0 15px;
  background:#1e293b;
  color:white;
  margin-bottom:15px;
  font-size:16px;
}

button{
  width:100%;
  height:50px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:#020617;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.error{
  background:#7f1d1d;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.panel{
  display:none;
  padding:20px;
}

.title{
  font-size:32px;
  margin-bottom:20px;
  color:#38bdf8;
}

.tables{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:20px;
}

.table-btn{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

.table-btn:hover{
  background:#38bdf8;
  color:#020617;
}

.table-container{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:15px;
  padding:20px;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:700px;
}

th{
  background:#1e293b;
  color:#38bdf8;
  padding:14px;
  text-align:left;
}

td{
  padding:14px;
  border-bottom:1px solid #1e293b;
}

tr:hover{
  background:#111827;
}

.loading{
  padding:30px;
  text-align:center;
}

@media(max-width:768px){

  .title{
    font-size:24px;
  }

}

</style>

</head>
<body>

<div
  class="login"
  id="loginScreen"
>

  <div class="login-box">

    <h1>
      Admin Master
    </h1>

    <div id="error"></div>

    <input
      type="password"
      id="password"
      placeholder="Senha master"
    >

    <button onclick="login()">
      Entrar
    </button>

  </div>

</div>

<div
  class="panel"
  id="panel"
>

  <h1 class="title">
    Painel Master - Banco de Dados
  </h1>

  <div
    class="tables"
    id="tables"
  ></div>

  <div class="table-container">

    <div
      id="loading"
      class="loading"
    >
      Selecione uma tabela
    </div>

    <table
      id="table"
      style="display:none;"
    >

      <thead id="thead"></thead>

      <tbody id="tbody"></tbody>

    </table>

  </div>

</div>

<script>

async function login(){

  const password = document
    .getElementById('password')
    .value;

  const response = await fetch('/admin/login', {

    method:'POST',

    headers:{
      'Content-Type':'application/json'
    },

    body:JSON.stringify({
      password
    })

  });

  const data = await response.json();

  if(!data.success){

    document.getElementById('error').innerHTML = `
      <div class="error">
        Senha inválida
      </div>
    `;

    return;

  }

  document.getElementById('loginScreen').style.display = 'none';

  document.getElementById('panel').style.display = 'block';

  carregarTabelas();

}

async function carregarTabelas(){

  const response = await fetch('/admin/tables');

  const tables = await response.json();

  const container = document.getElementById('tables');

  container.innerHTML = '';

  tables.forEach(table => {

    container.innerHTML += `

      <button
        class="table-btn"
        onclick="carregarTabela('${table.name}')"
      >
        ${table.name}
      </button>

    `;

  });

}

async function carregarTabela(nome){

  document.getElementById('loading').style.display = 'block';

  document.getElementById('table').style.display = 'none';

  const response = await fetch(`/admin/table/${nome}`);

  const data = await response.json();

  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');

  if(data.length === 0){

    document.getElementById('loading').innerHTML =
      'Tabela vazia';

    return;

  }

  const columns = Object.keys(data[0]);

  thead.innerHTML = `
    <tr>
      ${columns.map(col => `<th>${col}</th>`).join('')}
    </tr>
  `;

  tbody.innerHTML = '';

  data.forEach(row => {

    tbody.innerHTML += `
      <tr>
        ${columns.map(col => `
          <td>${row[col]}</td>
        `).join('')}
      </tr>
    `;

  });

  document.getElementById('loading').style.display = 'none';

  document.getElementById('table').style.display = 'table';

}

</script>

</body>
</html>
