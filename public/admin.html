<!-- public/admin.html -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Admin Master - Quiz Rocha</title>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
  rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    radial-gradient(circle at top, #0f172a 0%, #020617 60%);
  color:white;
  font-family:'Inter', sans-serif;
  min-height:100vh;
}

/* LOGIN */

.login{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.login-box{
  width:100%;
  max-width:420px;
  background:rgba(15,23,42,.95);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  border-radius:24px;
  padding:40px 30px;
  box-shadow:
    0 0 40px rgba(0,0,0,.4);
}

.logo{
  width:80px;
  height:80px;
  border-radius:20px;
  background:#38bdf8;
  margin:auto;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
}

.login-box h1{
  text-align:center;
  margin-bottom:10px;
  font-size:32px;
}

.login-box p{
  text-align:center;
  color:#94a3b8;
  margin-bottom:30px;
}

.input-group{
  margin-bottom:18px;
}

.input-group label{
  display:block;
  margin-bottom:8px;
  color:#cbd5e1;
  font-size:14px;
}

input{
  width:100%;
  height:55px;
  border:none;
  outline:none;
  border-radius:14px;
  background:#1e293b;
  color:white;
  padding:0 18px;
  font-size:16px;
  border:1px solid transparent;
  transition:.2s;
}

input:focus{
  border-color:#38bdf8;
}

button{
  width:100%;
  height:55px;
  border:none;
  border-radius:14px;
  background:#38bdf8;
  color:#020617;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  transform:translateY(-2px);
  opacity:.95;
}

.error{
  background:#7f1d1d;
  padding:14px;
  border-radius:12px;
  margin-bottom:20px;
  text-align:center;
}

/* PANEL */

.panel{
  display:none;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  gap:15px;
  flex-wrap:wrap;
}

.title{
  font-size:34px;
  font-weight:700;
}

.subtitle{
  color:#94a3b8;
  margin-top:5px;
}

.tables{
  display:grid;
  grid-template-columns:
    repeat(auto-fit, minmax(180px,1fr));
  gap:15px;
  margin-bottom:25px;
}

.table-btn{
  background:#0f172a;
  border:1px solid #1e293b;
  color:white;
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  transition:.2s;
  font-size:15px;
  font-weight:600;
}

.table-btn:hover{
  border-color:#38bdf8;
  transform:translateY(-3px);
  background:#111c31;
}

.table-container{
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:24px;
  overflow:hidden;
  box-shadow:
    0 10px 40px rgba(0,0,0,.3);
}

.table-header{
  padding:20px;
  border-bottom:1px solid #1e293b;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.table-title{
  font-size:22px;
  font-weight:700;
}

.loading{
  padding:40px;
  text-align:center;
  color:#94a3b8;
}

.table-wrapper{
  width:100%;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:900px;
}

th{
  background:#111827;
  color:#38bdf8;
  padding:18px;
  text-align:left;
  font-size:14px;
  position:sticky;
  top:0;
}

td{
  padding:18px;
  border-bottom:1px solid #1e293b;
  font-size:14px;
}

tr{
  transition:.2s;
}

tr:hover{
  background:#111827;
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:#0ea5e9;
  color:#020617;
  font-size:12px;
  font-weight:700;
}

/* MOBILE */

@media(max-width:768px){

  .panel{
    padding:15px;
  }

  .title{
    font-size:26px;
  }

  .subtitle{
    font-size:14px;
  }

  .tables{
    grid-template-columns:1fr 1fr;
  }

  .table-btn{
    padding:15px;
    font-size:14px;
  }

  .table-header{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }

  td,th{
    padding:14px;
    font-size:13px;
  }

}

</style>

</head>
<body>

<!-- LOGIN -->

<div
  class="login"
  id="loginScreen"
>

  <div class="login-box">

    <div class="logo">
      🔐
    </div>

    <h1>
      Admin Master
    </h1>

    <p>
      Painel protegido do banco de dados
    </p>

    <div id="error"></div>

    <div class="input-group">

      <label>
        Senha master
      </label>

      <input
        type="password"
        id="password"
        placeholder="Digite sua senha"
      >

    </div>

    <button onclick="login()">
      Entrar no Painel
    </button>

  </div>

</div>

<!-- PAINEL -->

<div
  class="panel"
  id="panel"
>

  <div class="topbar">

    <div>

      <div class="title">
        Painel Master
      </div>

      <div class="subtitle">
        Controle completo do banco de dados
      </div>

    </div>

    <div class="badge">
      Quiz Rocha
    </div>

  </div>

  <div
    class="tables"
    id="tables"
  ></div>

  <div class="table-container">

    <div class="table-header">

      <div class="table-title" id="tableTitle">
        Banco de Dados
      </div>

      <div
        class="badge"
        id="rowCount"
      >
        0 registros
      </div>

    </div>

    <div
      id="loading"
      class="loading"
    >
      Selecione uma tabela
    </div>

    <div class="table-wrapper">

      <table
        id="table"
        style="display:none;"
      >

        <thead id="thead"></thead>

        <tbody id="tbody"></tbody>

      </table>

    </div>

  </div>

</div>

<script>

async function login(){

  const password =
    document.getElementById('password').value;

  const response = await fetch('/admin/login',{

    method:'POST',

    headers:{
      'Content-Type':'application/json'
    },

    body:JSON.stringify({
      password
    })

  });

  const data = await response.json();

  if(!data.success){

    document.getElementById('error').innerHTML = `
      <div class="error">
        Senha inválida
      </div>
    `;

    return;

  }

  document.getElementById('loginScreen')
    .style.display = 'none';

  document.getElementById('panel')
    .style.display = 'block';

  carregarTabelas();

}

async function carregarTabelas(){

  const response =
    await fetch('/admin/tables');

  const tables =
    await response.json();

  const container =
    document.getElementById('tables');

  container.innerHTML = '';

  tables.forEach(table => {

    container.innerHTML += `

      <button
        class="table-btn"
        onclick="carregarTabela('${table.name}')"
      >
        📁 ${table.name}
      </button>

    `;

  });

}

async function carregarTabela(nome){

  document.getElementById('loading')
    .style.display = 'block';

  document.getElementById('table')
    .style.display = 'none';

  const response =
    await fetch(`/admin/table/${nome}`);

  const data =
    await response.json();

  const thead =
    document.getElementById('thead');

  const tbody =
    document.getElementById('tbody');

  document.getElementById('tableTitle')
    .innerText = nome;

  document.getElementById('rowCount')
    .innerText = `${data.length} registros`;

  if(data.length === 0){

    document.getElementById('loading')
      .innerHTML = 'Tabela vazia';

    return;

  }

  const columns = Object.keys(data[0]);

  thead.innerHTML = `
    <tr>
      ${columns.map(col =>
        `<th>${col}</th>`
      ).join('')}
    </tr>
  `;

  tbody.innerHTML = '';

  data.forEach(row => {

    tbody.innerHTML += `
      <tr>
        ${columns.map(col => `
          <td>${row[col]}</td>
        `).join('')}
      </tr>
    `;

  });

  document.getElementById('loading')
    .style.display = 'none';

  document.getElementById('table')
    .style.display = 'table';

}

</script>

</body>
</html>
