<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Relatórios - Quiz Rocha</title>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#020617;
  --card:#111827;
  --card2:#1e293b;
  --border:rgba(255,255,255,.06);
  --text:#ffffff;
  --muted:#94a3b8;
  --green:#22c55e;
  --blue:#2563eb;
  --orange:#f59e0b;
  --red:#ef4444;

}

body{

  background:
    radial-gradient(
      circle at top,
      #0f172a 0%,
      #020617 65%
    );

  color:var(--text);

  font-family:'Inter',sans-serif;

  min-height:100vh;

  padding:25px;

}

.container{
  max-width:1350px;
  margin:auto;
}

/* ======================
TOP
====================== */

.top{

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:35px;

}

.title{
  font-size:46px;
  font-weight:800;
}

.subtitle{
  color:var(--muted);
  margin-top:8px;
}

.back{

  border:none;
  text-decoration:none;

  padding:16px 24px;

  border-radius:18px;

  background:
    linear-gradient(
      135deg,
      #2563eb,
      #1d4ed8
    );

  color:white;
  font-weight:700;

  transition:.2s;

}

.back:hover{
  transform:translateY(-2px);
}

/* ======================
STATS
====================== */

.stats{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(240px,1fr));

  gap:22px;

  margin-bottom:30px;

}

.card{

  background:
    linear-gradient(
      180deg,
      rgba(30,41,59,.98),
      rgba(15,23,42,.98)
    );

  border:1px solid var(--border);

  border-radius:28px;

  padding:28px;

  box-shadow:
    0 20px 40px rgba(0,0,0,.25);

}

.card-value{
  font-size:46px;
  font-weight:800;
}

.card-label{
  margin-top:10px;
  color:var(--muted);
}

/* ======================
SECTION
====================== */

.section{

  background:
    linear-gradient(
      180deg,
      rgba(30,41,59,.98),
      rgba(15,23,42,.98)
    );

  border:1px solid var(--border);

  border-radius:30px;

  padding:30px;

  margin-bottom:30px;

}

.section-header{

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  margin-bottom:25px;
  flex-wrap:wrap;

}

.section-title{
  font-size:32px;
  font-weight:800;
}

.section-subtitle{
  color:var(--muted);
}

/* ======================
PLAYER
====================== */

.player{

  background:
    rgba(255,255,255,.03);

  border:1px solid rgba(255,255,255,.04);

  border-radius:22px;

  padding:22px;

  margin-top:16px;

}

.clickable{
  cursor:pointer;
  transition:.2s;
}

.clickable:hover{

  transform:translateY(-2px);

  border-color:
    rgba(37,99,235,.35);

}

.player-top{

  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;

}

.left{

  display:flex;
  align-items:center;
  gap:18px;

}

.position{

  width:52px;
  height:52px;

  border-radius:16px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-weight:800;
  font-size:18px;

  background:
    linear-gradient(
      135deg,
      #2563eb,
      #1d4ed8
    );

}

.player-name{
  font-size:20px;
  font-weight:700;
}

.player-sub{
  color:var(--muted);
  margin-top:5px;
}

.score{

  font-size:24px;
  font-weight:800;

  color:var(--green);

}

/* ======================
ANSWERS
====================== */

.answers{

  display:none;

  margin-top:24px;

  border-top:
    1px solid rgba(255,255,255,.06);

  padding-top:24px;

}

.answers.show{
  display:block;
}

.answer-item{

  background:
    rgba(255,255,255,.03);

  border:
    1px solid rgba(255,255,255,.05);

  border-radius:18px;

  padding:18px;

  margin-bottom:16px;

}

.answer-question{

  font-size:18px;

  font-weight:700;

  margin-bottom:14px;

  line-height:1.5;

}

.answer-result{

  display:inline-flex;

  padding:8px 14px;

  border-radius:12px;

  font-weight:700;

  margin-bottom:14px;

}

.correct{

  background:
    rgba(34,197,94,.12);

  color:#4ade80;

}

.wrong{

  background:
    rgba(239,68,68,.12);

  color:#f87171;

}

.answer-text{

  color:#cbd5e1;

  margin-bottom:10px;

  line-height:1.6;

}

.correct-answer{

  color:#4ade80;

  line-height:1.6;

}

/* ======================
QUESTIONS
====================== */

.question{

  background:
    rgba(255,255,255,.03);

  border:1px solid rgba(255,255,255,.05);

  border-radius:24px;

  padding:24px;

  margin-top:18px;

}

.question-top{

  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:20px;
  flex-wrap:wrap;

}

.question-title{

  font-size:20px;
  font-weight:700;
  line-height:1.5;

}

.error-badge{

  background:
    rgba(239,68,68,.15);

  color:#f87171;

  padding:10px 16px;

  border-radius:14px;

  font-weight:700;

  white-space:nowrap;

}

.question-stats{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

  gap:14px;

  margin-top:20px;

}

.stat-box{

  background:
    rgba(255,255,255,.03);

  border-radius:18px;

  padding:18px;

}

.stat-label{
  color:var(--muted);
  font-size:14px;
}

.stat-value{
  margin-top:10px;
  font-size:26px;
  font-weight:800;
}

.red{
  color:#f87171;
}

.green{
  color:#4ade80;
}

/* ======================
EMPTY
====================== */

.empty{

  padding:70px;

  text-align:center;

  border-radius:24px;

  border:1px dashed rgba(255,255,255,.08);

}

.empty h3{
  margin-bottom:12px;
}

/* ======================
LOADING
====================== */

.loading{

  display:flex;

  align-items:center;

  justify-content:center;

  min-height:300px;

  color:var(--muted);

  font-size:20px;

}

/* ======================
RESPONSIVO
====================== */

@media(max-width:700px){

  body{
    padding:15px;
  }

  .title{
    font-size:34px;
  }

  .section-title{
    font-size:26px;
  }

  .player-top,
  .question-top{
    flex-direction:column;
    align-items:flex-start;
  }

  .left{
    width:100%;
  }

  .score{
    margin-left:70px;
  }

}

</style>

</head>

<body>

<div class="container">

  <!-- TOP -->

  <div class="top">

    <div>

      <div
        class="title"
        id="quiz-title"
      >
        Relatório
      </div>

      <div class="subtitle">
        Estatísticas detalhadas do quiz
      </div>

    </div>

    <a
      href="/dashboard.html"
      class="back"
    >
      Voltar
    </a>

  </div>

  <!-- STATS -->

  <div class="stats">

    <div class="card">

      <div
        class="card-value"
        id="players"
      >
        0
      </div>

      <div class="card-label">
        Jogadores
      </div>

    </div>

    <div class="card">

      <div
        class="card-value"
        id="average"
      >
        0
      </div>

      <div class="card-label">
        Média Geral
      </div>

    </div>

    <div class="card">

      <div
        class="card-value"
        id="best"
      >
        0
      </div>

      <div class="card-label">
        Melhor Pontuação
      </div>

    </div>

    <div class="card">

      <div
        class="card-value"
        id="ranking-total"
      >
        0
      </div>

      <div class="card-label">
        Ranking
      </div>

    </div>

  </div>

  <!-- RANKING -->

  <div class="section">

    <div class="section-header">

      <div class="section-title">
        Ranking de Jogadores
      </div>

      <div
        class="section-subtitle"
        id="ranking-text"
      >
        0 jogadores
      </div>

    </div>

    <div id="ranking-list">

      <div class="loading">
        Carregando relatório...
      </div>

    </div>

  </div>

  <!-- PERGUNTAS MAIS ERRADAS -->

  <div class="section">

    <div class="section-header">

      <div class="section-title">
        Perguntas Mais Erradas
      </div>

      <div class="section-subtitle">
        Somente deste quiz
      </div>

    </div>

    <div id="wrong-questions">

      <div class="loading">
        Carregando perguntas...
      </div>

    </div>

  </div>

</div>

<script>

const token =
  localStorage.getItem("token");

if(!token){

  window.location.href = "/";

}

const params =
  new URLSearchParams(
    window.location.search
  );

const quizId =
  params.get("id");

/* ======================
TOGGLE RESPOSTAS
====================== */

function togglePlayer(index){

  const el =
    document.getElementById(
      `answers-${index}`
    );

  el.classList.toggle("show");

}

/* ======================
CARREGAR
====================== */

async function carregar(){

  try{

    const res =
      await fetch(
        `/api/quizzes/report/${quizId}`,
        {
          headers:{
            Authorization:
              `Bearer ${token}`
          }
        }
      );

    if(!res.ok){

      throw new Error(
        "Erro ao carregar relatório"
      );

    }

    const data =
      await res.json();

    /* ======================
    STATS
    ====================== */

    document.getElementById(
      "quiz-title"
    ).innerHTML =
      data.stats.title || "Relatório";

    document.getElementById(
      "players"
    ).innerHTML =
      data.stats.total_players || 0;

    document.getElementById(
      "average"
    ).innerHTML =
      Number(
        data.stats.average_score || 0
      ).toFixed(1);

    document.getElementById(
      "best"
    ).innerHTML =
      data.stats.best_score || 0;

    document.getElementById(
      "ranking-total"
    ).innerHTML =
      data.ranking.length;

    document.getElementById(
      "ranking-text"
    ).innerHTML =
      `${data.ranking.length} jogadores`;

    /* ======================
    RANKING
    ====================== */

    const ranking =
      document.getElementById(
        "ranking-list"
      );

    ranking.innerHTML = "";

    if(!data.ranking.length){

      ranking.innerHTML = `

        <div class="empty">

          <h3>
            Nenhum jogador ainda
          </h3>

          <p>
            Assim que alguém responder o quiz,
            o ranking aparecerá aqui.
          </p>

        </div>

      `;

    }else{

      data.ranking.forEach((r,index)=>{

        ranking.innerHTML += `

          <div
            class="player clickable"
            onclick="togglePlayer(${index})"
          >

            <div class="player-top">

              <div class="left">

                <div class="position">
                  #${index + 1}
                </div>

                <div>

                  <div class="player-name">
                    ${r.player_name}
                  </div>

                  <div class="player-sub">
                    Clique para ver respostas
                  </div>

                </div>

              </div>

              <div class="score">
                ${r.score} pts
              </div>

            </div>

            <div
              class="answers"
              id="answers-${index}"
            >

              ${
                r.answers &&
                r.answers.length

                ? r.answers.map((a,i)=>`

                  <div class="answer-item">

                    <div class="answer-question">
                      ${i + 1}. ${a.question}
                    </div>

                    <div class="
                      answer-result
                      ${a.correct ? 'correct' : 'wrong'}
                    ">

                      ${
                        a.correct
                        ? '✔ Acertou'
                        : '✖ Errou'
                      }

                    </div>

                    <div class="answer-text">

                      <strong>Resposta:</strong>
                      ${a.answer}

                    </div>

                    ${
                      !a.correct

                      ? `

                        <div class="correct-answer">

                          <strong>Resposta correta:</strong>
                          ${a.correct_answer}

                        </div>

                      `

                      : ''

                    }

                  </div>

                `).join("")

                : `

                  <div class="empty">

                    Nenhuma resposta encontrada.

                  </div>

                `
              }

            </div>

          </div>

        `;

      });

    }

    /* ======================
    PERGUNTAS MAIS ERRADAS
    ====================== */

    const wrong =
      document.getElementById(
        "wrong-questions"
      );

    wrong.innerHTML = "";

    if(
      !data.wrong_questions ||
      !data.wrong_questions.length
    ){

      wrong.innerHTML = `

        <div class="empty">

          <h3>
            Nenhuma estatística disponível
          </h3>

          <p>
            Ainda não existem respostas suficientes.
          </p>

        </div>

      `;

      return;

    }

    data.wrong_questions.forEach((q,index)=>{

      const errors =
        Number(q.errors || 0);

      const hits =
        Number(q.hits || 0);

      const total =
        errors + hits;

      const percent =
        total > 0
          ? Math.round(
              (errors / total) * 100
            )
          : 0;

      wrong.innerHTML += `

        <div class="question">

          <div class="question-top">

            <div class="question-title">
              ${index + 1}. ${q.question}
            </div>

            <div class="error-badge">
              ${percent}% de erro
            </div>

          </div>

          <div class="question-stats">

            <div class="stat-box">

              <div class="stat-label">
                Respostas Erradas
              </div>

              <div class="stat-value red">
                ${errors}
              </div>

            </div>

            <div class="stat-box">

              <div class="stat-label">
                Respostas Corretas
              </div>

              <div class="stat-value green">
                ${hits}
              </div>

            </div>

            <div class="stat-box">

              <div class="stat-label">
                Total de Tentativas
              </div>

              <div class="stat-value">
                ${total}
              </div>

            </div>

          </div>

        </div>

      `;

    });

  }catch(err){

    console.error(err);

    document.getElementById(
      "ranking-list"
    ).innerHTML = `

      <div class="empty">

        <h3>
          Erro ao carregar relatório
        </h3>

        <p>
          Verifique se a rota do backend
          está funcionando.
        </p>

      </div>

    `;

  }

}

carregar();

</script>

</body>
</html>
