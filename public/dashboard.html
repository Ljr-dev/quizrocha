<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>Dashboard - Quiz Rocha</title>

<link
  rel="preconnect"
  href="https://fonts.googleapis.com"
>

<link
  rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin
>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
  rel="stylesheet"
>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{

  --bg:#020617;
  --card:#0f172a;

  --text:#ffffff;
  --muted:#94a3b8;

  --green:#22c55e;
  --green-dark:#16a34a;

  --blue:#3b82f6;
  --blue-dark:#2563eb;

  --orange:#f59e0b;
  --orange-dark:#d97706;

  --red:#ef4444;
  --red-dark:#dc2626;

}

body{

  background:
    radial-gradient(
      circle at top,
      #0f172a 0%,
      #020617 65%
    );

  min-height:100vh;

  font-family:'Inter',sans-serif;

  color:white;

  padding:25px;

}

.container{
  max-width:1450px;
  margin:auto;
}



/* ======================
TOPBAR
====================== */

.topbar{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:20px;

  flex-wrap:wrap;

  margin-bottom:35px;

}

.brand{

  display:flex;

  align-items:center;

  gap:18px;

}

.logo{

  width:80px;
  height:80px;

  border-radius:24px;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(
      135deg,
      #2563eb,
      #22c55e
    );

  font-size:34px;
  font-weight:800;

  box-shadow:
    0 20px 50px rgba(37,99,235,.35);

}

.brand h1{
  font-size:40px;
  font-weight:800;
}

.brand p{
  color:#94a3b8;
  margin-top:6px;
}

.user-area{

  display:flex;

  align-items:center;

  gap:15px;

}

.user-card{

  background:
    rgba(255,255,255,0.05);

  padding:15px 20px;

  border-radius:20px;

  border:1px solid rgba(255,255,255,.05);

}

.user-card span{
  color:#94a3b8;
  font-size:14px;
}

.user-name{
  margin-top:5px;
  font-weight:700;
}

.logout{

  border:none;

  padding:16px 22px;

  border-radius:18px;

  cursor:pointer;

  font-weight:700;

  color:white;

  background:
    linear-gradient(
      135deg,
      var(--red),
      var(--red-dark)
    );

}



/* ======================
GRID
====================== */

.grid{

  display:grid;

  grid-template-columns:
    370px 1fr;

  gap:28px;

}



/* ======================
CARD
====================== */

.card{

  background:
    linear-gradient(
      180deg,
      rgba(17,24,39,.98),
      rgba(15,23,42,.98)
    );

  border-radius:32px;

  border:1px solid rgba(255,255,255,.06);

  padding:28px;

  box-shadow:
    0 20px 50px rgba(0,0,0,.3);

}

.card-title{
  margin-bottom:25px;
}

.card-title h2{
  font-size:30px;
}



/* ======================
INPUTS
====================== */

.input-group{
  margin-bottom:18px;
}

.input-label{

  display:block;

  margin-bottom:10px;

  color:#94a3b8;

  font-size:14px;

}

input,
select{

  width:100%;

  border:none;

  outline:none;

  padding:18px;

  border-radius:18px;

  background:#f8fafc;

  font-size:15px;

}



/* ======================
CREATE BUTTON
====================== */

.create-btn{

  width:100%;

  border:none;

  padding:18px;

  border-radius:18px;

  margin-top:10px;

  cursor:pointer;

  font-size:16px;
  font-weight:800;

  background:
    linear-gradient(
      135deg,
      var(--green),
      var(--green-dark)
    );

  color:#04130a;

}



/* ======================
STATS
====================== */

.stats{

  display:grid;

  grid-template-columns:
    repeat(2,1fr);

  gap:18px;

  margin-bottom:25px;

}

.stat{

  background:
    rgba(255,255,255,.04);

  border-radius:24px;

  padding:24px;

}

.stat-number{
  font-size:38px;
  font-weight:800;
}

.stat-label{
  color:#94a3b8;
  margin-top:8px;
}



/* ======================
QUIZ GRID
====================== */

.quiz-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(380px,1fr));

  gap:28px;

}



/* ======================
QUIZ CARD
====================== */

.quiz-card{

  background:
    linear-gradient(
      180deg,
      rgba(30,41,59,.95),
      rgba(15,23,42,.98)
    );

  border:1px solid rgba(255,255,255,.05);

  border-radius:32px;

  padding:28px;

  transition:.25s;

}

.quiz-card:hover{
  transform:translateY(-5px);
  border-color:rgba(59,130,246,.5);
}

.quiz-top{

  display:flex;

  justify-content:space-between;

  align-items:flex-start;

  gap:15px;

}

.quiz-title{
  font-size:28px;
  font-weight:800;
}

.quiz-id{
  margin-top:8px;
  color:#94a3b8;
}



/* ======================
BADGES
====================== */

.badge{

  padding:10px 16px;

  border-radius:999px;

  font-size:12px;
  font-weight:700;

}

.public{
  background:rgba(34,197,94,.15);
  color:#86efac;
}

.private{
  background:rgba(239,68,68,.15);
  color:#fca5a5;
}



/* ======================
SHARE
====================== */

.share-area{
  margin-top:22px;
}

.share-label{
  color:#94a3b8;
  margin-bottom:10px;
}

.share-box{

  display:flex;

  gap:10px;

}

.share-input{

  flex:1;

  background:#020617;

  color:white;

  border:1px solid rgba(255,255,255,.05);

}

.copy-btn{

  border:none;

  padding:14px 18px;

  border-radius:16px;

  cursor:pointer;

  font-weight:700;

  background:
    linear-gradient(
      135deg,
      var(--green),
      var(--green-dark)
    );

  color:#04130a;

}



/* ======================
META
====================== */

.meta{
  margin-top:22px;
}

.meta-card{

  background:
    rgba(255,255,255,.04);

  padding:20px;

  border-radius:22px;

}

.meta-value{
  font-size:36px;
  font-weight:800;
}

.meta-label{
  margin-top:6px;
  color:#94a3b8;
}



/* ======================
ACTIONS
====================== */

.actions{

  display:grid;

  grid-template-columns:
    repeat(2,1fr);

  gap:12px;

  margin-top:24px;

}

.action{

  border:none;

  padding:16px;

  border-radius:18px;

  text-decoration:none;

  text-align:center;

  font-weight:700;

  cursor:pointer;

}

.open{
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:#04130a;
}

.edit{
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
}

.report{
  background:linear-gradient(135deg,#f59e0b,#d97706);
  color:white;
}

.delete{
  background:linear-gradient(135deg,#ef4444,#dc2626);
  color:white;
}



/* ======================
EMPTY
====================== */

.empty{

  padding:70px;

  text-align:center;

  border-radius:28px;

  border:1px dashed rgba(255,255,255,.08);

}

.empty h3{
  margin-bottom:10px;
}



/* ======================
RESPONSIVO
====================== */

@media(max-width:1100px){

  .grid{
    grid-template-columns:1fr;
  }

}

@media(max-width:700px){

  body{
    padding:15px;
  }

  .stats{
    grid-template-columns:1fr;
  }

  .quiz-grid{
    grid-template-columns:1fr;
  }

  .actions{
    grid-template-columns:1fr;
  }

  .share-box{
    flex-direction:column;
  }

  .quiz-top{
    flex-direction:column;
  }

  .brand h1{
    font-size:32px;
  }

}

</style>

</head>

<body>

<div class="container">

<div class="topbar">

  <div class="brand">

    <div class="logo">
      Q
    </div>

    <div>

      <h1>
        Quiz Rocha
      </h1>

      <p>
        Plataforma de criação de quizzes
      </p>

    </div>

  </div>

  <div class="user-area">

    <div class="user-card">

      <span>
        Conectado como
      </span>

      <div
        class="user-name"
        id="welcome"
      >
        Usuário
      </div>

    </div>

    <button
      class="logout"
      onclick="logout()"
    >
      Sair
    </button>

  </div>

</div>

<div class="grid">

  <div class="card">

    <div class="card-title">

      <h2>
        Criar Quiz
      </h2>

    </div>

    <div class="input-group">

      <label class="input-label">
        Título do quiz
      </label>

      <input
        type="text"
        id="title"
        placeholder="Ex: Quiz Bíblico"
      >

    </div>

    <div class="input-group">

      <label class="input-label">
        Visibilidade
      </label>

      <select id="visibility">

        <option value="1">
          🌎 Público
        </option>

        <option value="0">
          🔒 Privado
        </option>

      </select>

    </div>

    <div class="input-group">

      <label class="input-label">
        Senha
      </label>

      <input
        type="text"
        id="password"
        placeholder="Opcional"
      >

    </div>

    <button
      class="create-btn"
      onclick="criarQuiz()"
    >
      Criar Quiz
    </button>

  </div>

  <div>

    <div class="stats">

      <div class="stat">

        <div
          class="stat-number"
          id="total-quizzes"
        >
          0
        </div>

        <div class="stat-label">
          Quizzes
        </div>

      </div>

      <div class="stat">

        <div
          class="stat-number"
          id="total-questions"
        >
          0
        </div>

        <div class="stat-label">
          Perguntas
        </div>

      </div>

    </div>

    <div class="card">

      <div class="card-title">

        <h2>
          Meus Quizzes
        </h2>

      </div>

      <div
        class="quiz-grid"
        id="quizList"
      ></div>

    </div>

  </div>

</div>

</div>

<script>

const token =
  localStorage.getItem("token");

const user =
  JSON.parse(
    localStorage.getItem("user")
  );

if(!token){
  window.location.href = "/";
}

document.getElementById(
  "welcome"
).innerHTML =
  user?.name || "Usuário";

function logout(){

  localStorage.removeItem("token");

  localStorage.removeItem("user");

  window.location.href = "/";

}

function copiarLink(id){

  const input =
    document.getElementById(
      `link-${id}`
    );

  navigator.clipboard.writeText(
    input.value
  );

  alert("Link copiado!");

}

async function carregarQuizzes(){

  try{

    const res =
      await fetch(
        "/api/quizzes",
        {
          headers:{
            Authorization:
              `Bearer ${token}`
          }
        }
      );

    const quizzes =
      await res.json();

    const lista =
      document.getElementById(
        "quizList"
      );

    lista.innerHTML = "";

    document.getElementById(
      "total-quizzes"
    ).innerHTML =
      quizzes.length;

    let totalQuestions = 0;

    quizzes.forEach((quiz)=>{

      totalQuestions +=
        quiz.total_questions || 0;

    });

    document.getElementById(
      "total-questions"
    ).innerHTML =
      totalQuestions;

    if(!quizzes.length){

      lista.innerHTML = `
        <div class="empty">

          <h3>
            Nenhum quiz criado
          </h3>

          <p>
            Crie seu primeiro quiz agora.
          </p>

        </div>
      `;

      return;

    }

    quizzes.forEach((quiz)=>{

      const slug =
        quiz.slug ||
        `quiz-${quiz.id}`;

      const shareLink =
        `${window.location.origin}/play/${slug}`;

      lista.innerHTML += `

        <div class="quiz-card">

          <div class="quiz-top">

            <div>

              <div class="quiz-title">
                ${quiz.title}
              </div>

              <div class="quiz-id">
                ID #${quiz.id}
              </div>

            </div>

            <div class="
              badge
              ${
                quiz.is_public == 1
                ? "public"
                : "private"
              }
            ">

              ${
                quiz.is_public == 1
                ? "Público"
                : "Privado"
              }

            </div>

          </div>

          <div class="share-area">

            <div class="share-label">
              Link para compartilhar
            </div>

            <div class="share-box">

              <input
                type="text"
                readonly
                id="link-${quiz.id}"
                value="${shareLink}"
                class="share-input"
              >

              <button
                class="copy-btn"
                onclick="
                  copiarLink(${quiz.id})
                "
              >
                Copiar
              </button>

            </div>

          </div>

          <div class="meta">

            <div class="meta-card">

              <div class="meta-value">
                ${quiz.total_questions}
              </div>

              <div class="meta-label">
                Perguntas
              </div>

            </div>

          </div>

          <div class="actions">

            <a
              href="/play/${slug}"
              target="_blank"
              class="action open"
            >
              Abrir
            </a>

            <a
              href="/editor.html?id=${quiz.id}"
              class="action edit"
            >
              Editar
            </a>

            <a
              href="/relatorios.html?id=${quiz.id}"
              class="action report"
            >
              Relatório
            </a>

            <button
              class="action delete"
              onclick="
                deletarQuiz(${quiz.id})
              "
            >
              Excluir
            </button>

          </div>

        </div>

      `;

    });

  }catch(err){

    console.error(err);

    alert(
      "Erro ao carregar quizzes"
    );

  }

}

async function criarQuiz(){

  const title =
    document.getElementById(
      "title"
    ).value;

  const is_public =
    document.getElementById(
      "visibility"
    ).value;

  const password =
    document.getElementById(
      "password"
    ).value;

  if(!title){

    return alert(
      "Digite o título"
    );

  }

  try{

    const res =
      await fetch(
        "/api/quizzes",
        {

          method:"POST",

          headers:{
            "Content-Type":
              "application/json",

            Authorization:
              `Bearer ${token}`
          },

          body:JSON.stringify({
            title,
            is_public,
            password
          })

        }
      );

    const data =
      await res.json();

    alert(
      data.message
    );

    document.getElementById(
      "title"
    ).value = "";

    document.getElementById(
      "password"
    ).value = "";

    carregarQuizzes();

  }catch(err){

    console.error(err);

    alert(
      "Erro ao criar quiz"
    );

  }

}

async function deletarQuiz(id){

  const confirmar =
    confirm(
      "Deseja excluir este quiz?"
    );

  if(!confirmar){
    return;
  }

  try{

    const res =
      await fetch(
        `/api/quizzes/${id}`,
        {

          method:"DELETE",

          headers:{
            Authorization:
              `Bearer ${token}`
          }

        }
      );

    const data =
      await res.json();

    alert(
      data.message
    );

    carregarQuizzes();

  }catch(err){

    console.error(err);

    alert(
      "Erro ao excluir quiz"
    );

  }

}

carregarQuizzes();

</script>

</body>
</html>
