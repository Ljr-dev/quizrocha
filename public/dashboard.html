<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>Dashboard - Quiz Rocha</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#020617;
  color:white;
  font-family:Arial;
}

.container{
  width:100%;
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.logout{
  background:#ef4444;
  border:none;
  color:white;
  padding:12px 18px;
  border-radius:10px;
  cursor:pointer;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  margin-bottom:30px;
}

.card h2{
  margin-bottom:20px;
}

input,
select{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

.quiz-grid{
  display:grid;
  grid-template-columns:
  repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.quiz{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
}

.quiz h3{
  margin-bottom:10px;
}

.quiz p{
  color:#94a3b8;
  margin-bottom:15px;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.actions a{
  flex:1;
  text-align:center;
  text-decoration:none;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
}

.edit{
  background:#334155;
  color:white;
}

.play{
  background:#22c55e;
  color:black;
}

.copy{
  background:#0f172a;
  color:white;
}

.empty{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  text-align:center;
  color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

  <div class="top">

    <div>

      <h1>Quiz Rocha</h1>

      <p id="welcome"></p>

    </div>

    <button
      class="logout"
      onclick="logout()"
    >
      Sair
    </button>

  </div>



  <div class="card">

    <h2>Criar Quiz</h2>

    <input
      type="text"
      id="title"
      placeholder="Título do quiz"
    >

    <select id="visibility">

      <option value="1">
        🌎 Público
      </option>

      <option value="0">
        🔒 Privado
      </option>

    </select>

    <input
      type="password"
      id="password"
      placeholder="Senha do quiz (opcional)"
    >

    <button onclick="criarQuiz()">
      Criar Quiz
    </button>

  </div>



  <div
    id="lista"
    class="quiz-grid"
  ></div>

</div>

<script>

const user =
JSON.parse(
  localStorage.getItem("user")
);

const token =
localStorage.getItem("token");



if(!user || !token){

  window.location.href =
  "/login.html";

}



document.getElementById(
  "welcome"
).innerHTML =
`👋 Olá, ${user.name}`;



async function carregarQuizzes(){

  const res = await fetch(

    `/api/quizzes/${user.id}`,

    {
      headers:{
        Authorization:
        `Bearer ${token}`
      }
    }

  );



  const quizzes =
    await res.json();



  const lista =
    document.getElementById("lista");



  lista.innerHTML = "";



  if(!Array.isArray(quizzes)){

    lista.innerHTML = `
      <div class="empty">
        Erro ao carregar quizzes
      </div>
    `;

    return;

  }



  if(quizzes.length === 0){

    lista.innerHTML = `
      <div class="empty">
        Nenhum quiz criado ainda
      </div>
    `;

    return;

  }



  quizzes.forEach(q => {

    const playLink =
    `${window.location.origin}/play/${q.slug}`;

    lista.innerHTML += `

      <div class="quiz">

        <h3>${q.title}</h3>

        <p>
          Slug: ${q.slug}
        </p>

        <div class="actions">

          <a
            class="edit"
            href="/quiz.html?id=${q.id}"
          >
            ✏️ Editar
          </a>

          <a
            class="play"
            href="${playLink}"
          >
            ▶️ Jogar
          </a>

          <a
            class="copy"
            href="#"
            onclick="copiar('${playLink}')"
          >
            🔗 Copiar
          </a>

        </div>

      </div>

    `;

  });

}



async function criarQuiz(){

  const title =
  document.getElementById(
    "title"
  ).value;



  const is_public =
  document.getElementById(
    "visibility"
  ).value;



  const password =
  document.getElementById(
    "password"
  ).value;



  if(!title){

    return alert(
      "Digite o título"
    );

  }



  await fetch(

    "/api/quizzes",

    {

      method:"POST",

      headers:{

        "Content-Type":
        "application/json",

        Authorization:
        `Bearer ${token}`

      },

      body:JSON.stringify({

        user_id:user.id,

        title,

        is_public,

        password

      })

    }

  );



  document.getElementById(
    "title"
  ).value = "";



  document.getElementById(
    "password"
  ).value = "";



  carregarQuizzes();

}



function copiar(link){

  navigator.clipboard
  .writeText(link);

  alert("Link copiado");

}



function logout(){

  localStorage.clear();

  window.location.href =
  "/login.html";

}



carregarQuizzes();

</script>

</body>
</html>
